<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! - Fusion Pro</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 820px;
      max-height: 95vh;
      position: relative;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .target-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .target-badge {
      background: #252c3b;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 700;
      color: #fbbf24;
    }
    .random-btn {
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(249,115,22,0.3);
    }
    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      background: #212838;
      margin: 8px 16px;
      border-radius: 28px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 12px;
      color: #8a9bb5;
      text-transform: uppercase;
    }
    .map-container {
      flex: 1;
      margin: 8px 16px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #2e3a4e;
      background: #1e2632;
      position: relative;
      min-height: 280px;
    }
    #map { width: 100%; height: 100%; z-index: 1; }
    .gps-status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #9cd49c;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .fusion-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #fbbf24;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .gps-error-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(220, 38, 38, 0.9);
      padding: 12px;
      border-radius: 16px;
      color: white;
      font-size: 14px;
      z-index: 1001;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .gps-error-panel button {
      background: white;
      color: #dc2626;
      border: none;
      padding: 10px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px 25px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      background: #2d3748;
      color: #e2e8f0;
      border: 1px solid #3e4c61;
    }
    .ctrl-btn.primary {
      background: #007bff;
      color: white;
      border: none;
    }
    .ctrl-btn:disabled { opacity: 0.4; pointer-events: none; }
    
    .ios-permission-hint {
      background: #fbbf24;
      color: #000;
      padding: 12px 20px;
      margin: 0 16px 10px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
    }
    .ios-permission-hint button {
      background: #000;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    .modal-card {
      background: #1e293b;
      border-radius: 40px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      border: 2px solid #fbbf24;
      box-shadow: 0 30px 40px #00000055;
    }
    .modal-icon { font-size: 64px; color: #fbbf24; margin-bottom: 15px; }
    .voucher-code {
      background: #0f172a;
      padding: 16px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #facc15;
      border: 2px dashed #fbbf24;
      margin: 20px 0;
    }
    .close-modal {
      background: #ff6b00;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .footnote {
      padding: 0 20px 15px;
      font-size: 12px;
      color: #7c8ba0;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="title"><i class="fas fa-shield-hal"></i> VungTauGO! Fusion</span>
    <div class="target-area">
      <div class="target-badge" id="targetDisplay">🎲 0m</div>
      <button class="random-btn" id="randomTargetBtn"><i class="fas fa-dice"></i> MỤC TIÊU</button>
    </div>
  </div>
  
  <div class="ios-permission-hint" id="iosPermissionHint" style="display: none;">
    <span><i class="fab fa-apple"></i> Cần quyền cảm biến</span>
    <button id="requestMotionBtn">🔓 Cấp quyền</button>
  </div>
  
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="distanceDisplay">0.00</div>
      <div class="stat-label">KM</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stepsDisplay">0</div>
      <div class="stat-label">BƯỚC</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="elevationDisplay">0</div>
      <div class="stat-label">ĐỘ CAO (m)</div>
    </div>
  </div>
  
  <div class="map-container">
    <div id="map"></div>
    <div class="gps-status" id="gpsStatus">🛰️ Đang khởi tạo...</div>
    <div class="fusion-badge" id="fusionBadge">⚖️ Chờ dữ liệu</div>
    <div class="gps-error-panel" id="gpsErrorPanel" style="display: none;">
      <span id="gpsErrorMsg">Lỗi GPS</span>
      <div style="display: flex; gap: 8px;">
        <button id="openSettingsBtn"><i class="fas fa-cog"></i> Mở Cài Đặt</button>
        <button id="retryGpsBtn"><i class="fas fa-sync-alt"></i> Thử Lại</button>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
    <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
    <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> KẾT THÚC</button>
  </div>
  <div class="footnote">
    <span><i class="fas fa-balance-scale"></i> GPS ↔ Bước chân cân bằng</span>
    <span>🏆 Voucher khi hoàn thành</span>
  </div>
</div>

<div class="modal-overlay" id="voucherModal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <h2>Chúc mừng!</h2>
    <p>Bạn đã hoàn thành mục tiêu</p>
    <div class="voucher-code" id="voucherCode">VTGO-ABC123</div>
    <button class="close-modal" id="closeModalBtn">TIẾP TỤC</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function(){
    "use strict";

    // ---------- CẤU HÌNH CÂN BẰNG ----------
    const CONFIG = {
      kalman: { Q: 0.001, R: 8, P: 1 },
      pedometer: {
        minStepInterval: 280,
        maxStepFreq: 3.5,
        threshold: 11.5,
        shakePenaltyThreshold: 18,
        maxShakeCount: 3,
        defaultStepLength: 0.75,        // mét
        stepLengthMin: 0.5,
        stepLengthMax: 1.2
      },
      gps: {
        minDistance: 0.001,
        maxSpeed: 2.5,
        maxJumpDistance: 0.015,
        goodAccuracy: 15,               // mét
        mediumAccuracy: 25,
        driftThreshold: 0.8
      },
      fusion: {
        // Khi GPS tốt: trọng số GPS cao
        // Khi GPS trung bình: 50/50
        // Khi GPS yếu: dùng bước
        useStepWhenAccuracyAbove: 25
      }
    };

    // ---------- STATE ----------
    let targetDistanceKm = 1.0;
    let currentDistanceKm = 0.0;
    let steps = 0;
    let isActive = false;
    let isPaused = false;
    let startTime = null;
    let elapsedSeconds = 0;
    let timerInterval = null;
    
    // Bước chân
    let currentStepLength = CONFIG.pedometer.defaultStepLength;
    let stepsSinceLastCalibration = 0;
    let gpsDistanceSinceLastCalibration = 0;
    
    // Elevation
    let totalElevationGain = 0;
    let lastElevation = null;
    
    // Kalman & GPS
    let kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
    let lastGpsTimestamp = null;
    let lastFusionTimestamp = null;
    let watchId = null;
    let lastValidPosition = null;
    
    // Motion analysis
    let accHistory = [];
    let isMoving = false;
    let lastStepTimestamp = 0;
    let shakeCounter = 0;
    let motionPermissionGranted = false;
    
    // Fusion mode indicator
    let fusionMode = 'idle'; // 'gps', 'mixed', 'steps'
    
    // Map
    let map;
    let userMarker;
    let pathPolyline;
    let pathCoordinates = [];
    
    // UI
    const distanceEl = document.getElementById('distanceDisplay');
    const stepsEl = document.getElementById('stepsDisplay');
    const elevationEl = document.getElementById('elevationDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const gpsStatusEl = document.getElementById('gpsStatus');
    const fusionBadge = document.getElementById('fusionBadge');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const randomTargetBtn = document.getElementById('randomTargetBtn');
    const modalOverlay = document.getElementById('voucherModal');
    const voucherCodeEl = document.getElementById('voucherCode');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const gpsErrorPanel = document.getElementById('gpsErrorPanel');
    const gpsErrorMsg = document.getElementById('gpsErrorMsg');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const retryGpsBtn = document.getElementById('retryGpsBtn');
    const iosPermissionHint = document.getElementById('iosPermissionHint');
    const requestMotionBtn = document.getElementById('requestMotionBtn');

    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    if (isIOS && typeof DeviceMotionEvent.requestPermission === 'function') {
      iosPermissionHint.style.display = 'flex';
    }

    // ---------- RANDOM MỤC TIÊU ----------
    function generateRandomTarget() {
      const m = Math.floor(Math.random() * (300 - 50 + 1)) + 50;
      targetDistanceKm = m / 1000;
      targetDisplay.textContent = `🎲 ${m}m`;
    }
    generateRandomTarget();

    // ---------- KALMAN ----------
    function kalmanUpdate(measuredLat, measuredLng, dt, accuracy) {
      if (kalman.lat === null) {
        kalman.lat = measuredLat;
        kalman.lng = measuredLng;
        return { lat: measuredLat, lng: measuredLng };
      }
      const R = Math.max(1, Math.min(30, accuracy)) * 0.3;
      const Q = CONFIG.kalman.Q * dt;
      let predLat = kalman.lat + kalman.vLat * dt;
      let predLng = kalman.lng + kalman.vLng * dt;
      let P = kalman.P + Q;
      const K = P / (P + R);
      const innovLat = measuredLat - predLat;
      const innovLng = measuredLng - predLng;
      kalman.lat = predLat + K * innovLat;
      kalman.lng = predLng + K * innovLng;
      kalman.vLat = kalman.vLat + (K * innovLat) / dt;
      kalman.vLng = kalman.vLng + (K * innovLng) / dt;
      kalman.P = (1 - K) * P;
      return { lat: kalman.lat, lng: kalman.lng };
    }

    // ---------- ELEVATION ----------
    async function fetchElevation(lat, lng) {
      try {
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await res.json();
        return data.results?.[0]?.elevation;
      } catch { return null; }
    }

    async function updateElevation(lat, lng) {
      const elev = await fetchElevation(lat, lng);
      if (elev !== null) {
        if (lastElevation !== null && isActive && !isPaused) {
          const gain = elev - lastElevation;
          if (gain > 0) totalElevationGain += gain;
        }
        lastElevation = elev;
        elevationEl.textContent = Math.round(totalElevationGain);
      }
    }

    // ---------- HIỆU CHỈNH ĐỘ DÀI BƯỚC ----------
    function calibrateStepLength(gpsDist, stepCount) {
      if (stepCount > 5 && gpsDist > 0.005) {
        let rawStepLen = (gpsDist * 1000) / stepCount;
        rawStepLen = Math.min(CONFIG.pedometer.stepLengthMax, Math.max(CONFIG.pedometer.stepLengthMin, rawStepLen));
        currentStepLength = currentStepLength * 0.6 + rawStepLen * 0.4;
      }
    }

    // ---------- FUSION LOGIC (CÂN BẰNG) ----------
    function computeDistanceFromGps(distGps, accuracy) {
      if (!isActive || isPaused) return 0;
      
      let addedDistance = 0;
      const stepDistance = (stepsSinceLastCalibration * currentStepLength) / 1000;
      
      if (accuracy <= CONFIG.gps.goodAccuracy) {
        // GPS tốt: tin tưởng hoàn toàn
        addedDistance = distGps;
        fusionMode = '🛰️ GPS';
        // Hiệu chỉnh bước
        calibrateStepLength(distGps, stepsSinceLastCalibration);
        gpsDistanceSinceLastCalibration = 0;
        stepsSinceLastCalibration = 0;
      } else if (accuracy <= CONFIG.gps.mediumAccuracy) {
        // GPS trung bình: kết hợp 50/50
        const gpsWeight = 0.5;
        const stepWeight = 0.5;
        addedDistance = distGps * gpsWeight + stepDistance * stepWeight;
        fusionMode = '⚖️ Kết hợp';
        // Vẫn hiệu chỉnh nhẹ
        calibrateStepLength(distGps * 0.5, stepsSinceLastCalibration);
        gpsDistanceSinceLastCalibration = 0;
        stepsSinceLastCalibration = 0;
      } else {
        // GPS yếu: dùng bước chân
        addedDistance = stepDistance;
        fusionMode = '👟 Bước chân';
        gpsDistanceSinceLastCalibration = 0;
        stepsSinceLastCalibration = 0;
      }
      
      fusionBadge.innerHTML = `${fusionMode} | Độ dài bước: ${currentStepLength.toFixed(2)}m`;
      return addedDistance;
    }

    // ---------- PEDOMETER CHỐNG LẮC TAY & PHÁT HIỆN CHUYỂN ĐỘNG ----------
    function requestMotionPermission() {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(perm => {
          if (perm === 'granted') {
            motionPermissionGranted = true;
            window.addEventListener('devicemotion', handleMotion);
            iosPermissionHint.style.display = 'none';
          }
        }).catch(console.error);
      } else {
        window.addEventListener('devicemotion', handleMotion);
        motionPermissionGranted = true;
      }
    }

    function initPedometer() {
      if (!window.DeviceMotionEvent) return;
      if (typeof DeviceMotionEvent.requestPermission !== 'function') {
        window.addEventListener('devicemotion', handleMotion);
        motionPermissionGranted = true;
      }
    }

    function handleMotion(event) {
      if (!isActive || isPaused) return;
      
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      
      const x = acc.x, y = acc.y, z = acc.z;
      const magnitude = Math.sqrt(x*x + y*y + z*z);
      const now = Date.now();
      
      // Lọc thông thấp cho gia tốc
      accHistory.push(magnitude);
      if (accHistory.length > 5) accHistory.shift();
      const avgMagnitude = accHistory.reduce((a,b) => a+b, 0) / accHistory.length;
      
      // Phát hiện chuyển động (dùng phương sai)
      const variance = accHistory.reduce((s, v) => s + (v-avgMagnitude)**2, 0) / accHistory.length;
      isMoving = variance > 0.8;
      
      // Chống lắc tay
      if (magnitude > CONFIG.pedometer.shakePenaltyThreshold) {
        shakeCounter++;
        if (shakeCounter >= CONFIG.pedometer.maxShakeCount) {
          steps = Math.max(0, steps - 2);
          stepsSinceLastCalibration = Math.max(0, stepsSinceLastCalibration - 2);
          shakeCounter = 0;
          fusionBadge.innerHTML = '⚠️ Gian lận - đã trừ bước';
        }
        return;
      } else {
        shakeCounter = Math.max(0, shakeCounter - 1);
      }
      
      // Đếm bước
      if (magnitude > CONFIG.pedometer.threshold && (now - lastStepTimestamp) > CONFIG.pedometer.minStepInterval) {
        const freq = 1000 / (now - lastStepTimestamp);
        if (freq < CONFIG.pedometer.maxStepFreq) {
          steps++;
          stepsSinceLastCalibration++;
          lastStepTimestamp = now;
          
          // Nếu không có GPS trong 4 giây và đang di chuyển -> ước lượng từ bước
          const timeSinceGps = lastGpsTimestamp ? Date.now() - lastGpsTimestamp : 9999;
          if (timeSinceGps > 4000 && isMoving) {
            const stepDist = currentStepLength / 1000;
            currentDistanceKm += stepDist;
            updateUI();
            if (currentDistanceKm >= targetDistanceKm) completeGoal();
          }
        }
      }
    }

    // ---------- UTILS ----------
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function updateUI() {
      distanceEl.textContent = currentDistanceKm.toFixed(2);
      stepsEl.textContent = steps;
    }
    
    function updatePath(lat, lng) {
      if (!map) return;
      pathCoordinates.push([lat, lng]);
      if (pathPolyline) {
        pathPolyline.setLatLngs(pathCoordinates);
      } else {
        pathPolyline = L.polyline(pathCoordinates, {
          color: '#007bff', weight: 6, opacity: 0.9, smoothFactor: 1.0
        }).addTo(map);
      }
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
      } else {
        userMarker = L.circleMarker([lat, lng], {
          radius: 6, color: '#007bff', weight: 3, fillColor: '#fff', fillOpacity: 1
        }).addTo(map);
      }
      map.panTo([lat, lng]);
      updateElevation(lat, lng);
    }
    
    // ---------- GPS ----------
    function handlePositionError(err) {
      gpsErrorPanel.style.display = 'flex';
      let msg = err.code === 1 ? '🚫 Quyền vị trí bị từ chối' : `⚠️ Lỗi GPS (${err.message})`;
      gpsErrorMsg.textContent = msg;
      gpsStatusEl.innerHTML = '⚠️ Lỗi GPS';
    }

    function retryGps() {
      gpsErrorPanel.style.display = 'none';
      if (watchId) navigator.geolocation.clearWatch(watchId);
      watchId = null;
      startWatchingGPS();
    }

    function openLocationSettings() {
      alert('Vào Cài đặt > Quyền riêng tư > Dịch vụ vị trí > Safari > "Khi dùng ứng dụng"');
    }
    
    function handlePosition(position) {
      gpsErrorPanel.style.display = 'none';
      const { latitude, longitude, accuracy } = position.coords;
      const now = position.timestamp;
      
      if (accuracy > 50) {
        gpsStatusEl.innerHTML = `⚠️ GPS rất yếu (${Math.round(accuracy)}m)`;
        return;
      }
      
      lastGpsTimestamp = now;
      gpsStatusEl.innerHTML = `🛰️ GPS ${Math.round(accuracy)}m`;
      
      let filteredLat = latitude, filteredLng = longitude;
      if (lastFusionTimestamp && kalman.lat !== null) {
        const dt = (now - lastFusionTimestamp) / 1000;
        if (dt > 0 && dt < 10) {
          const filtered = kalmanUpdate(latitude, longitude, dt, accuracy);
          filteredLat = filtered.lat;
          filteredLng = filtered.lng;
        }
      }
      lastFusionTimestamp = now;
      
      if (!lastValidPosition) {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        updatePath(filteredLat, filteredLng);
        return;
      }
      
      const dist = haversine(lastValidPosition.lat, lastValidPosition.lng, filteredLat, filteredLng);
      const timeDiff = (now - lastValidPosition.timestamp) / 1000;
      let valid = true;
      let speed = 0;
      
      if (timeDiff > 0) {
        speed = dist / timeDiff;
        if (speed > CONFIG.gps.maxSpeed || dist > CONFIG.gps.maxJumpDistance) {
          valid = false;
          gpsStatusEl.innerHTML += ' 🚫 Nhảy';
        }
        // Drift protection
        if (speed < CONFIG.gps.driftThreshold && !isMoving) {
          valid = false;
        }
      }
      
      if (valid && isActive && !isPaused) {
        if (dist >= CONFIG.gps.minDistance) {
          // Tính toán quãng đường thêm vào dựa trên Fusion
          const added = computeDistanceFromGps(dist, accuracy);
          currentDistanceKm += added;
          
          // Reset calibration accumulators cho lần sau
          gpsDistanceSinceLastCalibration = 0;
          stepsSinceLastCalibration = 0;
          
          lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
          updatePath(filteredLat, filteredLng);
        }
      }
      
      updateUI();
      if (currentDistanceKm >= targetDistanceKm) completeGoal();
    }
    
    function startWatchingGPS() {
      if (!navigator.geolocation) return;
      watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    }
    
    // ---------- ĐIỀU KHIỂN ----------
    function startActivity() {
      if (isIOS && !motionPermissionGranted && typeof DeviceMotionEvent.requestPermission === 'function') {
        requestMotionPermission();
        alert('Vui lòng cấp quyền cảm biến rồi nhấn BẮT ĐẦU lần nữa.');
        return;
      }
      if (!watchId) startWatchingGPS();
      
      isActive = true;
      isPaused = false;
      if (!startTime) startTime = Date.now() - elapsedSeconds * 1000;
      else startTime = Date.now() - elapsedSeconds * 1000;
      
      timerInterval = setInterval(() => {
        if (isActive && !isPaused) {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        }
      }, 200);
      
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
    }
    
    function pauseActivity() {
      if (!isActive) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
      } else {
        startTime = Date.now() - elapsedSeconds * 1000;
        timerInterval = setInterval(() => {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        }, 200);
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      }
    }
    
    function stopActivity() {
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
    }
    
    function resetSession() {
      currentDistanceKm = 0;
      steps = 0;
      elapsedSeconds = 0;
      totalElevationGain = 0;
      lastElevation = null;
      currentStepLength = CONFIG.pedometer.defaultStepLength;
      gpsDistanceSinceLastCalibration = 0;
      stepsSinceLastCalibration = 0;
      startTime = null;
      kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
      lastGpsTimestamp = null;
      lastFusionTimestamp = null;
      lastValidPosition = null;
      lastStepTimestamp = 0;
      shakeCounter = 0;
      pathCoordinates = [];
      if (pathPolyline) map.removeLayer(pathPolyline);
      pathPolyline = null;
      if (userMarker) map.removeLayer(userMarker);
      userMarker = null;
      fusionBadge.innerHTML = '⚖️ Chờ dữ liệu';
      generateRandomTarget();
      updateUI();
      elevationEl.textContent = '0';
    }
    
    function completeGoal() {
      if (!isActive) return;
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      const voucher = 'VTGO-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      voucherCodeEl.textContent = voucher;
      modalOverlay.style.visibility = 'visible';
    }
    
    // ---------- MAP INIT ----------
    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false })
        .setView([10.3469, 107.0843], 17);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap, CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);
      L.control.attribution({ position: 'bottomleft' }).addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      navigator.geolocation.getCurrentPosition((pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        updatePath(pos.coords.latitude, pos.coords.longitude);
        gpsStatusEl.innerHTML = '📍 Sẵn sàng';
      }, handlePositionError, { enableHighAccuracy: true });
    }
    
    // ---------- EVENT ----------
    randomTargetBtn.addEventListener('click', () => { if (!isActive) generateRandomTarget(); });
    startBtn.addEventListener('click', startActivity);
    pauseBtn.addEventListener('click', pauseActivity);
    stopBtn.addEventListener('click', stopActivity);
    closeModalBtn.addEventListener('click', () => {
      modalOverlay.style.visibility = 'hidden';
      resetSession();
    });
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.style.visibility = 'hidden'; });
    openSettingsBtn.addEventListener('click', openLocationSettings);
    retryGpsBtn.addEventListener('click', retryGps);
    if (requestMotionBtn) requestMotionBtn.addEventListener('click', requestMotionPermission);
    
    // Start
    initMap();
    startWatchingGPS();
    initPedometer();
    updateUI();
  })();
</script>
</body>
</html>
