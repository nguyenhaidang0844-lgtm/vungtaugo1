<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VUNGTAUGO! Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d);
            background: var(--bg-dark);
            color: #fff; min-height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        /* Glassmorphism UI */
        .app-card {
            width: 90%; max-width: 380px; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px; padding: 40px 25px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .progress-container {
            position: relative; width: 220px; height: 220px; margin: 0 auto 30px;
        }
        svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        circle {
            fill: none; stroke-width: 12; stroke-linecap: round;
            cx: 110; cy: 110; r: 95;
        }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-progress {
            stroke: url(#gradient); stroke-dasharray: 597; stroke-dashoffset: 597;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dist-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .dist-num { font-size: 60px; font-weight: 800; display: block; line-height: 1; }
        .dist-unit { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
        
        .btn-start {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #fff; padding: 20px 40px; border-radius: 20px;
            font-size: 18px; font-weight: 700; cursor: pointer; width: 100%;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }
        .status-bar {
            margin-top: 25px; padding: 12px; border-radius: 15px;
            background: rgba(0,0,0,0.2); font-size: 12px; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        .pulse-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--success);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        #qr-box { display: none; margin-top: 20px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-card">
    <div id="init-ui">
        <h1 style="font-weight: 800; font-size: 32px; margin: 0;">VUNGTAUGO!</h1>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 40px;">Bốc thăm thử thách vận động</p>
        <button class="btn-start" onclick="startApp()">BẮT ĐẦU NGAY</button>
    </div>

    <div id="tracker-ui" style="display: none;">
        <div class="progress-container">
            <svg>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#00d2ff" />
                        <stop offset="100%" stop-color="#3a7bd5" />
                    </linearGradient>
                </defs>
                <circle class="circle-bg" />
                <circle id="p-bar" class="circle-progress" />
            </svg>
            <div class="dist-info">
                <span class="dist-num" id="current-m">0</span>
                <span class="dist-unit">MÉT</span>
            </div>
        </div>
        <div style="font-weight: 600; color: var(--primary); margin-bottom: 5px;" id="target-label">Mục tiêu: -- m</div>
        
        <div id="qr-box">
            <p style="color: var(--success); font-weight: bold; margin: 0 0 10px;">THỬ THÁCH HOÀN TẤT!</p>
            <img id="qr-img" src="" style="width: 150px; height: 150px; border-radius: 15px; border: 4px solid #fff;">
            <p id="code-txt" style="font-family: monospace; font-size: 18px; margin: 10px 0;"></p>
        </div>
    </div>

    <div class="status-bar" id="status-bar">
        <div class="pulse-dot" id="dot" style="background: #666; animation: none;"></div>
        <span id="st-text">Đang chờ khởi động...</span>
    </div>
</div>

<script>
    let tracker = {
        target: 0,
        distance: 0,
        lastCoords: null,
        isLive: false,
        accuracyLimit: 25, // Mét
        // Lọc Kalman đơn giản
        prevLat: null,
        prevLon: null
    };

    function startApp() {
        // Bốc thăm từ 20-50m
        tracker.target = [20, 30, 40, 50][Math.floor(Math.random() * 4)];
        document.getElementById('init-ui').style.display = 'none';
        document.getElementById('tracker-ui').style.display = 'block';
        document.getElementById('target-label').innerText = `MỤC TIÊU: ${tracker.target} MÉT`;
        document.getElementById('dot').style.animation = 'pulse 1.5s infinite';
        document.getElementById('dot').style.background = '#00ff88';
        
        initGPS();
    }

    function initGPS() {
        if (!navigator.geolocation) return alert("Trình duyệt không hỗ trợ GPS");

        navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude, accuracy, speed } = pos.coords;
                
                // LỚP 1: Chặn sai số lớn
                if (accuracy > tracker.accuracyLimit) {
                    updateStatus("Tín hiệu GPS yếu, hãy ra chỗ thoáng...");
                    return;
                }

                // LỚP 2: Chặn hack bằng xe máy (tốc độ > 4m/s ~ 14.4km/h)
                if (speed && speed > 4) {
                    updateStatus("Bạn đang đi quá nhanh!");
                    return;
                }

                updateStatus("Đang ghi nhận vận động...");

                if (tracker.prevLat && tracker.prevLon) {
                    const d = getDist(tracker.prevLat, tracker.prevLon, latitude, longitude);
                    
                    // LỚP 3: Lọc nhiễu Drift (chỉ tính nếu di chuyển thực sự từ 2m - 20m giữa 2 lần lấy mẫu)
                    if (d > 2 && d < 20) {
                        tracker.distance += d;
                        updateUI();
                    }
                }
                tracker.prevLat = latitude;
                tracker.prevLon = longitude;
            },
            () => updateStatus("Lỗi kết nối GPS"),
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function updateUI() {
        const m = Math.floor(tracker.distance);
        document.getElementById('current-m').innerText = m;
        
        // Cập nhật vòng tròn tiến trình
        const offset = 597 - (Math.min(m / tracker.target, 1) * 597);
        document.getElementById('p-bar').style.strokeDashoffset = offset;

        if (m >= tracker.target && !tracker.isLive) {
            finishChallenge();
        }
    }

    function finishChallenge() {
        tracker.isLive = true;
        if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
        
        const code = "VTG" + Math.random().toString(36).substr(2,5).toUpperCase();
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=VALID_${code}`;
        document.getElementById('code-txt').innerText = code;
        document.getElementById('qr-box').style.display = 'block';
        document.getElementById('dot').style.animation = 'none';
        updateStatus("Đã hoàn thành thử thách!");

        Swal.fire({
            title: 'TUYỆT VỜI!',
            text: `Bạn đã đi đủ ${tracker.target}m. Đưa mã ${code} cho nhân viên nhé!`,
            icon: 'success',
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#00d2ff'
        });
    }

    function updateStatus(txt) {
        document.getElementById('st-text').innerText = txt;
    }
</script>
</body>
</html>
