<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! - Leaflet Edition</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 820px;
      max-height: 95vh;
      position: relative;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .target-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .target-badge {
      background: #252c3b;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 700;
      color: #fbbf24;
    }
    .random-btn {
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(249,115,22,0.3);
    }
    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      background: #212838;
      margin: 8px 16px;
      border-radius: 28px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 12px;
      color: #8a9bb5;
      text-transform: uppercase;
    }
    .map-container {
      flex: 1;
      margin: 8px 16px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #2e3a4e;
      background: #1e2632;
      position: relative;
      min-height: 280px;
    }
    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .gps-status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #9cd49c;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .gps-error-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(220, 38, 38, 0.9);
      padding: 12px;
      border-radius: 16px;
      color: white;
      font-size: 14px;
      z-index: 1001;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .gps-error-panel button {
      background: white;
      color: #dc2626;
      border: none;
      padding: 10px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px 25px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      background: #2d3748;
      color: #e2e8f0;
      border: 1px solid #3e4c61;
    }
    .ctrl-btn.primary {
      background: #007bff;
      color: white;
      border: none;
    }
    .ctrl-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    
    /* Permission Hint */
    .ios-permission-hint {
      background: #fbbf24;
      color: #000;
      padding: 12px 20px;
      margin: 0 16px 10px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
    }
    .ios-permission-hint button {
      background: #000;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Voucher Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    .modal-card {
      background: #1e293b;
      border-radius: 40px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      border: 2px solid #fbbf24;
      box-shadow: 0 30px 40px #00000055;
    }
    .modal-icon { font-size: 64px; color: #fbbf24; margin-bottom: 15px; }
    .voucher-code {
      background: #0f172a;
      padding: 16px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #facc15;
      border: 2px dashed #fbbf24;
      margin: 20px 0;
    }
    .close-modal {
      background: #ff6b00;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .footnote {
      padding: 0 20px 15px;
      font-size: 12px;
      color: #7c8ba0;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="title"><i class="fas fa-shield-hal"></i> VungTauGO!</span>
    <div class="target-area">
      <div class="target-badge" id="targetDisplay">🎲 0m</div>
      <button class="random-btn" id="randomTargetBtn"><i class="fas fa-dice"></i> MỤC TIÊU</button>
    </div>
  </div>
  
  <!-- Nút cấp quyền cảm biến cho iOS -->
  <div class="ios-permission-hint" id="iosPermissionHint" style="display: none;">
    <span><i class="fab fa-apple"></i> Cần quyền cảm biến để đếm bước</span>
    <button id="requestMotionBtn">🔓 Cấp quyền</button>
  </div>
  
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="distanceDisplay">0.00</div>
      <div class="stat-label">KM</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stepsDisplay">0</div>
      <div class="stat-label">BƯỚC</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="elevationDisplay">0</div>
      <div class="stat-label">ĐỘ CAO (m)</div>
    </div>
  </div>
  
  <div class="map-container">
    <div id="map"></div>
    <div class="gps-status" id="gpsStatus">🛰️ Đang khởi tạo...</div>
    <div class="gps-error-panel" id="gpsErrorPanel" style="display: none;">
      <span id="gpsErrorMsg">Lỗi GPS</span>
      <div style="display: flex; gap: 8px;">
        <button id="openSettingsBtn"><i class="fas fa-cog"></i> Mở Cài Đặt</button>
        <button id="retryGpsBtn"><i class="fas fa-sync-alt"></i> Thử Lại</button>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU CHẠY</button>
    <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
    <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> KẾT THÚC</button>
  </div>
  <div class="footnote">
    <span><i class="fas fa-microchip"></i> Distance + Steps Sync</span>
    <span>🏆 Nhận Voucher</span>
  </div>
</div>

<!-- Modal voucher -->
<div class="modal-overlay" id="voucherModal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <h2 style="margin-bottom: 8px;">Chúc mừng!</h2>
    <p style="margin-bottom: 5px;">Bạn đã hoàn thành mục tiêu</p>
    <div class="voucher-code" id="voucherCode">VTGO-ABC123</div>
    <p style="margin-bottom: 20px;">Mã giảm giá đặc biệt cho bạn</p>
    <button class="close-modal" id="closeModalBtn">TIẾP TỤC</button>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function(){
    "use strict";

    // ---------- CẤU HÌNH ----------
    const CONFIG = {
      kalman: { Q: 0.001, R: 8, P: 1 },
      pedometer: {
        minStepInterval: 280,
        maxStepFreq: 3.5,
        threshold: 11.5,
        shakePenaltyThreshold: 18,
        maxShakeCount: 3,
        defaultStepLength: 0.8
      },
      gps: {
        minDistance: 0.001,
        maxSpeed: 2.5,
        maxJumpDistance: 0.01,
        weakSignalThreshold: 20,
        driftThreshold: 0.8
      }
    };

    // ---------- STATE ----------
    let targetDistanceKm = 1.0;
    let currentDistanceKm = 0.0;
    let steps = 0;
    let isActive = false;
    let isPaused = false;
    let startTime = null;
    let elapsedSeconds = 0;
    let timerInterval = null;
    let currentStepLength = CONFIG.pedometer.defaultStepLength;
    
    // Elevation
    let totalElevationGain = 0;
    let lastElevation = null;
    let elevationCache = new Map(); // Tránh gọi API liên tục
    
    // Kalman & GPS
    let kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
    let lastGpsTimestamp = null;
    let lastFusionTimestamp = null;
    let watchId = null;
    let lastValidPosition = null;
    
    // Motion history
    let avgSpeed = 2.0;
    let lastStepTimestamp = 0;
    
    // Pedometer
    let lastStepTime = 0;
    let shakeCounter = 0;
    let motionPermissionGranted = false;
    
    // Distance/Steps sync
    let gpsDistanceSinceLastCalibration = 0;
    let stepsSinceLastCalibration = 0;
    const CALIBRATION_STEP_COUNT = 30;
    
    // Leaflet Map
    let map;
    let userMarker;
    let pathPolyline;
    let pathCoordinates = [];
    
    // UI Elements
    const distanceEl = document.getElementById('distanceDisplay');
    const stepsEl = document.getElementById('stepsDisplay');
    const elevationEl = document.getElementById('elevationDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const gpsStatusEl = document.getElementById('gpsStatus');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const randomTargetBtn = document.getElementById('randomTargetBtn');
    const modalOverlay = document.getElementById('voucherModal');
    const voucherCodeEl = document.getElementById('voucherCode');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const gpsErrorPanel = document.getElementById('gpsErrorPanel');
    const gpsErrorMsg = document.getElementById('gpsErrorMsg');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const retryGpsBtn = document.getElementById('retryGpsBtn');
    const iosPermissionHint = document.getElementById('iosPermissionHint');
    const requestMotionBtn = document.getElementById('requestMotionBtn');

    // ---------- KIỂM TRA iOS ----------
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    if (isIOS && typeof DeviceMotionEvent.requestPermission === 'function') {
      iosPermissionHint.style.display = 'flex';
    }
    
    // ---------- RANDOM MỤC TIÊU ----------
    function generateRandomTarget() {
      const randomMeters = Math.floor(Math.random() * (300 - 50 + 1)) + 50;
      targetDistanceKm = randomMeters / 1000;
      targetDisplay.textContent = `🎲 ${randomMeters}m`;
      return randomMeters;
    }
    generateRandomTarget();

    // ---------- KALMAN FILTER ----------
    function kalmanUpdate(measuredLat, measuredLng, dt, accuracy) {
      if (kalman.lat === null) {
        kalman.lat = measuredLat;
        kalman.lng = measuredLng;
        return { lat: measuredLat, lng: measuredLng };
      }
      
      const R = Math.max(1, Math.min(30, accuracy)) * 0.3;
      const Q = CONFIG.kalman.Q * dt;
      
      let predLat = kalman.lat + kalman.vLat * dt;
      let predLng = kalman.lng + kalman.vLng * dt;
      let P = kalman.P + Q;
      
      const K = P / (P + R);
      const innovLat = measuredLat - predLat;
      const innovLng = measuredLng - predLng;
      
      kalman.lat = predLat + K * innovLat;
      kalman.lng = predLng + K * innovLng;
      kalman.vLat = kalman.vLat + (K * innovLat) / dt;
      kalman.vLng = kalman.vLng + (K * innovLng) / dt;
      kalman.P = (1 - K) * P;
      
      return { lat: kalman.lat, lng: kalman.lng };
    }

    // ---------- ELEVATION (Open-Elevation API) ----------
    async function fetchElevation(lat, lng) {
      const key = `${lat.toFixed(5)},${lng.toFixed(5)}`;
      if (elevationCache.has(key)) return elevationCache.get(key);
      
      try {
        const response = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await response.json();
        if (data.results && data.results.length > 0) {
          const elevation = data.results[0].elevation;
          elevationCache.set(key, elevation);
          return elevation;
        }
      } catch (e) {
        console.warn('Elevation error:', e);
      }
      return null;
    }

    async function updateElevation(lat, lng) {
      const elevation = await fetchElevation(lat, lng);
      if (elevation !== null) {
        if (lastElevation !== null && isActive && !isPaused) {
          const gain = elevation - lastElevation;
          if (gain > 0) {
            totalElevationGain += gain;
            elevationEl.textContent = Math.round(totalElevationGain);
          }
        }
        lastElevation = elevation;
      }
    }

    // ---------- HIỆU CHỈNH ĐỘ DÀI BƯỚC ----------
    function calibrateStepLength() {
      if (gpsDistanceSinceLastCalibration > 0.01 && stepsSinceLastCalibration > 5) {
        const avgStep = (gpsDistanceSinceLastCalibration * 1000) / stepsSinceLastCalibration;
        currentStepLength = currentStepLength * 0.7 + avgStep * 0.3;
        gpsDistanceSinceLastCalibration = 0;
        stepsSinceLastCalibration = 0;
      }
    }

    // ---------- PEDOMETER ----------
    function requestMotionPermission() {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(perm => {
          if (perm === 'granted') {
            motionPermissionGranted = true;
            window.addEventListener('devicemotion', handleMotion);
            iosPermissionHint.style.display = 'none';
            gpsStatusEl.innerHTML = '✅ Cảm biến đã sẵn sàng';
          }
        }).catch(console.error);
      } else {
        window.addEventListener('devicemotion', handleMotion);
        motionPermissionGranted = true;
      }
    }

    function initPedometer() {
      if (!window.DeviceMotionEvent) return;
      if (typeof DeviceMotionEvent.requestPermission !== 'function') {
        window.addEventListener('devicemotion', handleMotion);
        motionPermissionGranted = true;
      }
    }

    function handleMotion(event) {
      if (!isActive || isPaused) return;
      
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      
      const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
      const now = Date.now();
      
      if (magnitude > CONFIG.pedometer.shakePenaltyThreshold) {
        shakeCounter++;
        if (shakeCounter >= CONFIG.pedometer.maxShakeCount) {
          steps = Math.max(0, steps - 2);
          shakeCounter = 0;
        }
        return;
      } else {
        shakeCounter = Math.max(0, shakeCounter - 1);
      }
      
      if (magnitude > CONFIG.pedometer.threshold && (now - lastStepTime) > CONFIG.pedometer.minStepInterval) {
        const stepFreq = 1000 / (now - lastStepTime);
        if (stepFreq < CONFIG.pedometer.maxStepFreq) {
          steps++;
          stepsSinceLastCalibration++;
          lastStepTime = now;
          lastStepTimestamp = now;
          shakeCounter = 0;
          
          // Nếu GPS yếu, ước lượng quãng đường từ bước chân
          const timeSinceLastGps = lastGpsTimestamp ? Date.now() - lastGpsTimestamp : 9999;
          if (timeSinceLastGps > 3000) {
            currentDistanceKm += currentStepLength / 1000;
            updateUI();
          }
        }
      }
    }

    // ---------- UTILS ----------
    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function updateUI() {
      distanceEl.textContent = currentDistanceKm.toFixed(2);
      stepsEl.textContent = steps;
    }
    
    function updatePath(lat, lng) {
      if (!map) return;
      
      pathCoordinates.push([lat, lng]);
      if (pathPolyline) {
        pathPolyline.setLatLngs(pathCoordinates);
      } else {
        pathPolyline = L.polyline(pathCoordinates, {
          color: '#007bff',
          weight: 6,
          opacity: 0.9,
          smoothFactor: 1.0
        }).addTo(map);
      }
      
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
      } else {
        userMarker = L.circleMarker([lat, lng], {
          radius: 6,
          color: '#007bff',
          weight: 3,
          fillColor: '#fff',
          fillOpacity: 1
        }).addTo(map);
      }
      map.panTo([lat, lng]);
      
      // Cập nhật elevation
      updateElevation(lat, lng);
    }
    
    // ---------- GPS ----------
    function handlePositionError(err) {
      console.warn('GPS Error:', err);
      gpsErrorPanel.style.display = 'flex';
      
      let errorMsg = '';
      switch(err.code) {
        case 1:
          errorMsg = '🚫 Quyền vị trí bị từ chối. Vào Cài đặt > Safari > Vị trí > "Khi dùng ứng dụng".';
          break;
        case 2:
          errorMsg = '📡 Không thể lấy vị trí. Kiểm tra kết nối mạng.';
          break;
        case 3:
          errorMsg = '⏳ Timeout. Thử lại ở khu vực thoáng hơn.';
          break;
        default:
          errorMsg = `❌ Lỗi: ${err.message}`;
      }
      gpsErrorMsg.textContent = errorMsg;
      gpsStatusEl.innerHTML = '⚠️ Lỗi GPS';
    }

    function retryGps() {
      gpsErrorPanel.style.display = 'none';
      gpsStatusEl.innerHTML = '🔄 Đang thử lại GPS...';
      if (watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      startWatchingGPS();
    }

    function openLocationSettings() {
      alert('Vào Cài đặt > Quyền riêng tư > Dịch vụ vị trí > Safari > Chọn "Khi dùng ứng dụng"');
    }
    
    function handlePosition(position) {
      gpsErrorPanel.style.display = 'none';
      const { latitude, longitude, accuracy } = position.coords;
      const now = position.timestamp;
      
      if (accuracy > CONFIG.gps.weakSignalThreshold) {
        gpsStatusEl.innerHTML = `⚠️ GPS yếu (${Math.round(accuracy)}m)`;
        return;
      }
      
      lastGpsTimestamp = now;
      gpsStatusEl.innerHTML = `🛰️ GPS ${Math.round(accuracy)}m`;
      
      let filteredLat = latitude, filteredLng = longitude;
      if (lastFusionTimestamp && kalman.lat !== null) {
        const dt = (now - lastFusionTimestamp) / 1000;
        if (dt > 0 && dt < 10) {
          const filtered = kalmanUpdate(latitude, longitude, dt, accuracy);
          filteredLat = filtered.lat;
          filteredLng = filtered.lng;
        }
      }
      lastFusionTimestamp = now;
      
      if (!lastValidPosition) {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        updatePath(filteredLat, filteredLng);
        return;
      }
      
      const dist = haversine(lastValidPosition.lat, lastValidPosition.lng, filteredLat, filteredLng);
      const timeDiff = (now - lastValidPosition.timestamp) / 1000;
      let valid = true;
      let speed = 0;
      
      if (timeDiff > 0) {
        speed = dist / timeDiff;
        if (speed < CONFIG.gps.maxSpeed * 1.2) {
          avgSpeed = avgSpeed * 0.9 + speed * 0.1;
        }
        
        if (speed > CONFIG.gps.maxSpeed || dist > CONFIG.gps.maxJumpDistance) {
          valid = false;
          gpsStatusEl.innerHTML += ' 🚫 Nhảy vị trí';
        }
        
        const timeSinceLastStep = now - lastStepTimestamp;
        if (speed < CONFIG.gps.driftThreshold && timeSinceLastStep > 2000) {
          valid = false;
          gpsStatusEl.innerHTML += ' 🛑 Drift';
        }
      }
      
      if (valid && isActive && !isPaused) {
        if (dist >= CONFIG.gps.minDistance) {
          currentDistanceKm += dist;
          gpsDistanceSinceLastCalibration += dist;
          lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
          updatePath(filteredLat, filteredLng);
          
          calibrateStepLength();
        }
      }
      
      updateUI();
      if (currentDistanceKm >= targetDistanceKm) completeGoal();
    }
    
    function startWatchingGPS() {
      if (!navigator.geolocation) {
        alert('Trình duyệt không hỗ trợ GPS');
        return;
      }
      watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    }
    
    // ---------- ĐIỀU KHIỂN ----------
    function startActivity() {
      if (isIOS && !motionPermissionGranted && typeof DeviceMotionEvent.requestPermission === 'function') {
        requestMotionPermission();
        alert('Vui lòng nhấn "Cấp quyền" cho cảm biến, sau đó nhấn BẮT ĐẦU CHẠY lần nữa.');
        return;
      }
      
      if (!watchId) startWatchingGPS();
      
      isActive = true;
      isPaused = false;
      if (!startTime) startTime = Date.now() - elapsedSeconds * 1000;
      else startTime = Date.now() - elapsedSeconds * 1000;
      
      timerInterval = setInterval(() => {
        if (isActive && !isPaused) {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        }
      }, 200);
      
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
    }
    
    function pauseActivity() {
      if (!isActive) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
      } else {
        startTime = Date.now() - elapsedSeconds * 1000;
        timerInterval = setInterval(() => {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        }, 200);
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      }
    }
    
    function stopActivity() {
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
    }
    
    function resetSession() {
      currentDistanceKm = 0;
      steps = 0;
      elapsedSeconds = 0;
      totalElevationGain = 0;
      lastElevation = null;
      currentStepLength = CONFIG.pedometer.defaultStepLength;
      gpsDistanceSinceLastCalibration = 0;
      stepsSinceLastCalibration = 0;
      startTime = null;
      kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
      lastGpsTimestamp = null;
      lastFusionTimestamp = null;
      lastValidPosition = null;
      lastStepTime = 0;
      lastStepTimestamp = 0;
      shakeCounter = 0;
      avgSpeed = 2.0;
      pathCoordinates = [];
      if (pathPolyline) map.removeLayer(pathPolyline);
      pathPolyline = null;
      if (userMarker) map.removeLayer(userMarker);
      userMarker = null;
      
      generateRandomTarget();
      updateUI();
      elevationEl.textContent = '0';
    }
    
    function completeGoal() {
      if (!isActive) return;
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      
      const voucher = 'VTGO-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      voucherCodeEl.textContent = voucher;
      modalOverlay.style.visibility = 'visible';
    }
    
    // ---------- MAP INIT ----------
    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([10.3469, 107.0843], 17);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);
      
      L.control.attribution({ position: 'bottomleft' }).addTo(map);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      
      navigator.geolocation.getCurrentPosition((pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        updatePath(pos.coords.latitude, pos.coords.longitude);
        gpsStatusEl.innerHTML = '📍 Sẵn sàng';
      }, (err) => {
        handlePositionError(err);
      }, { enableHighAccuracy: true });
    }
    
    // ---------- EVENT LISTENERS ----------
    randomTargetBtn.addEventListener('click', () => {
      if (!isActive) generateRandomTarget();
    });
    
    startBtn.addEventListener('click', startActivity);
    pauseBtn.addEventListener('click', pauseActivity);
    stopBtn.addEventListener('click', stopActivity);
    
    closeModalBtn.addEventListener('click', () => {
      modalOverlay.style.visibility = 'hidden';
      resetSession();
    });
    
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.style.visibility = 'hidden';
    });
    
    openSettingsBtn.addEventListener('click', openLocationSettings);
    retryGpsBtn.addEventListener('click', retryGps);
    
    if (requestMotionBtn) {
      requestMotionBtn.addEventListener('click', requestMotionPermission);
    }
    
    // Khởi động
    initMap();
    startWatchingGPS();
    initPedometer();
    updateUI();
  })();
</script>
</body>
</html>
