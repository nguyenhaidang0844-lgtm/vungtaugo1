<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VUNGTAUGO! Anti-Cheat Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #050a14; --card: #111827; --accent: #fbbf24; --danger: #ef4444; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .container { width: 90%; max-width: 400px; background: var(--card); border-radius: 40px; padding: 35px 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .step-count { font-size: 80px; font-weight: 800; color: #fff; line-height: 1; margin: 10px 0; }
        .distance-sub { font-size: 24px; color: var(--primary); font-weight: 600; }
        .btn { background: linear-gradient(135deg, var(--secondary), var(--primary)); border: none; color: #fff; padding: 20px; border-radius: 22px; width: 100%; font-size: 18px; font-weight: 700; cursor: pointer; }
        .status-msg { font-size: 12px; height: 20px; margin-top: 15px; color: #94a3b8; transition: 0.3s; }
        .warning { color: var(--danger) !important; font-weight: bold; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1 style="font-size: 32px; margin-bottom: 5px;">VUNGTAUGO!</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Yêu cầu di chuyển thực tế</p>
        <button class="btn" onclick="requestPermissions()">BẮT ĐẦU THỬ THÁCH</button>
    </div>

    <div id="tracking-screen" style="display:none;">
        <div id="target-tag" style="color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 10px;">MỤC TIÊU: -- MÉT</div>
        <div style="font-size: 11px; color: #4b5563; letter-spacing: 2px;">BƯỚC CHÂN</div>
        <div class="step-count" id="steps">0</div>
        <div class="distance-sub"><span id="display-meters">0</span> m</div>
        
        <div id="status-msg" class="status-msg">Đang kiểm tra chuyển động...</div>
        
        <div style="margin-top: 20px; font-size: 11px; color: #334155;">
            GPS xác thực: <span id="gps-verify">0.0</span>m
        </div>
    </div>

    <div id="finish-screen" style="display:none;">
        <h2 style="color: var(--primary);">THÀNH CÔNG!</h2>
        <div style="background: white; padding: 15px; border-radius: 20px; display: inline-block;">
            <img id="qr-final" src="">
            <p id="gift-code" style="color: #000; font-weight: 800; margin: 10px 0 0;"></p>
        </div>
        <p style="font-size: 12px; color: #64748b; margin-top: 15px;">Vui lòng đưa mã cho nhân viên</p>
    </div>
</div>

<script>
    let state = {
        target: 20, // Để mặc định 20m cho demo booth
        steps: 0,
        gpsMeters: 0,
        startLat: null,
        startLon: null,
        lastLat: null,
        lastLon: null,
        isTracking: false,
        lastStepTime: 0
    };

    async function requestPermissions() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try { await DeviceMotionEvent.requestPermission(); } catch (e) {}
        }
        navigator.geolocation.getCurrentPosition((pos) => {
            state.startLat = pos.coords.latitude;
            state.startLon = pos.coords.longitude;
            startApp();
        }, () => alert("Vui lòng bật GPS để app xác thực bạn có di chuyển thật không!"));
    }

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('tracking-screen').style.display = 'block';
        document.getElementById('target-tag').innerText = `MỤC TIÊU: ${state.target} MÉT`;
        state.isTracking = true;
        initMotion();
        initGPS();
    }

    function initMotion() {
        window.addEventListener('devicemotion', (event) => {
            if (!state.isTracking) return;
            let acc = event.accelerationIncludingGravity;
            let gForce = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            let now = Date.now();

            // CHỐNG QUƠ TAY: Nếu lực lắc > 25 (quá mạnh), coi như gian lận
            if (gForce > 25) {
                showWarning("Vui lòng không lắc điện thoại!");
                return;
            }

            // Đếm bước khi lực từ 12 đến 20 (đi bộ tự nhiên)
            if (gForce > 12.5 && gForce < 20 && (now - state.lastStepTime > 350)) {
                state.steps++;
                state.lastStepTime = now;
                updateUI();
            }
        });
    }

    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            if (accuracy > 35) return;

            if (state.lastLat !== null) {
                let d = calculateDistance(state.lastLat, state.lastLon, latitude, longitude);
                if (d > 0.7 && d < 15) {
                    state.gpsMeters += d;
                    updateUI();
                }
            }
            state.lastLat = latitude;
            state.lastLon = longitude;
            document.getElementById('gps-verify').innerText = state.gpsMeters.toFixed(1);
        }, null, { enableHighAccuracy: true });
    }

    function updateUI() {
        // CÔNG THỨC CHỐNG GIAN LẬN:
        // Số mét hiển thị = 70% từ bước chân + 30% từ GPS thực tế
        // Điều này bắt buộc GPS phải nhảy thì số mét mới tăng mượt được
        let stepMeters = state.steps * 0.7;
        let displayMeters = Math.floor((stepMeters * 0.7) + (state.gpsMeters * 0.3));
        
        document.getElementById('steps').innerText = state.steps;
        document.getElementById('display-meters').innerText = displayMeters;

        // KIỂM TRA CUỐI CÙNG: 
        // Phải đủ số mét HIỂN THỊ VÀ GPS thực tế phải dịch chuyển ít nhất 5m so với điểm bắt đầu
        if (displayMeters >= state.target) {
            let realDistFromStart = calculateDistance(state.startLat, state.startLon, state.lastLat, state.lastLon);
            
            if (realDistFromStart < 5) {
                showWarning("Hãy di chuyển thực tế để nhận quà!");
            } else {
                finish();
            }
        }
    }

    function showWarning(msg) {
        let el = document.getElementById('status-msg');
        el.innerText = msg;
        el.classList.add('warning');
        setTimeout(() => el.classList.remove('warning'), 1000);
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function finish() {
        state.isTracking = false;
        document.getElementById('tracking-screen').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        const code = "VTAU-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        document.getElementById('gift-code').innerText = code;
        document.getElementById('qr-final').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${code}`;
        Swal.fire({ title: 'XÁC THỰC THÀNH CÔNG!', text: 'Bạn đã di chuyển thực tế. Nhận quà ngay!', icon: 'success' });
    }
</script>
</body>
</html>
