<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! - Siêu Chính Xác</title>
  
  <!-- Leaflet CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Font Awesome & Google Font -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 780px;
      max-height: 95vh;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .target-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .target-badge {
      background: #252c3b;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 700;
      color: #fbbf24;
    }
    .random-btn {
      background: #ff6b00;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(249,115,22,0.3);
    }
    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      background: #212838;
      margin: 8px 16px;
      border-radius: 28px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 12px;
      color: #8a9bb5;
      text-transform: uppercase;
    }
    .step-trust {
      font-size: 10px;
      margin-top: 2px;
      color: #4ade80;
    }
    .map-container {
      flex: 1;
      margin: 8px 16px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #2e3a4e;
      background: #1e2632;
      position: relative;
      min-height: 280px;
    }
    #map { width: 100%; height: 100%; z-index: 1; }
    .gps-status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #9cd49c;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px 25px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      background: #2d3748;
      color: #e2e8f0;
      border: 1px solid #3e4c61;
    }
    .ctrl-btn.primary {
      background: #007bff;
      color: white;
      border: none;
    }
    .ctrl-btn:disabled { opacity: 0.4; pointer-events: none; }
    
    /* Voucher Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      visibility: hidden;
    }
    .modal-card {
      background: #1e293b;
      border-radius: 40px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      border: 2px solid #fbbf24;
      box-shadow: 0 30px 40px #00000055;
    }
    .modal-icon { font-size: 64px; color: #fbbf24; margin-bottom: 15px; }
    .voucher-code {
      background: #0f172a;
      padding: 16px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #facc15;
      border: 2px dashed #fbbf24;
      margin: 20px 0;
    }
    .close-modal {
      background: #ff6b00;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .footnote {
      padding: 0 20px 15px;
      font-size: 12px;
      color: #7c8ba0;
      display: flex;
      justify-content: space-between;
    }
    .warning-badge {
      background: #dc2626;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      margin-left: 6px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="title"><i class="fas fa-shield-hal"></i> VungTauGO! Pro</span>
    <div class="target-area">
      <div class="target-badge" id="targetDisplay">🎲 0m</div>
      <button class="random-btn" id="randomTargetBtn"><i class="fas fa-dice"></i> MỤC TIÊU</button>
    </div>
  </div>
  
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="distanceDisplay">0</div>
      <div class="stat-label">MÉT</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stepsDisplay">0</div>
      <div class="stat-label">BƯỚC CHÂN</div>
      <div class="step-trust" id="stepTrustDisplay">✅ Hợp lệ</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="timerDisplay">00:00</div>
      <div class="stat-label">THỜI GIAN</div>
    </div>
  </div>
  
  <div class="map-container">
    <div id="map"></div>
    <div class="gps-status" id="gpsStatus">🛰️ Đang khởi tạo GPS...</div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
    <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
    <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> KẾT THÚC</button>
  </div>
  <div class="footnote">
    <span><i class="fas fa-microchip"></i> Kalman + Chống lắc + Anti‑Cheat</span>
    <span>🏆 Nhận Voucher</span>
  </div>
</div>

<!-- Modal voucher -->
<div class="modal-overlay" id="voucherModal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <h2 style="margin-bottom: 8px;">Chúc mừng!</h2>
    <p style="margin-bottom: 5px;">Bạn đã hoàn thành mục tiêu</p>
    <div class="voucher-code" id="voucherCode">VTGO-ABC123</div>
    <p style="margin-bottom: 20px;">Mã giảm giá đặc biệt cho bạn</p>
    <button class="close-modal" id="closeModalBtn">TIẾP TỤC</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CẤU HÌNH CHỐNG GIAN LẬN ----------
    const CONFIG = {
      // Kalman Filter
      kalman: { Q: 0.0005, R: 15, P: 1 },
      // Pedometer
      pedometer: {
        minStepInterval: 280,        // ms (tối thiểu giữa 2 bước)
        maxStepFreq: 3.5,            // tối đa 3.5 bước/giây
        threshold: 11.5,             // ngưỡng gia tốc (m/s²)
        shakePenaltyThreshold: 18,   // nếu gia tốc > 18 -> nghi ngờ lắc tay
        maxShakeCount: 3             // sau 3 lần nghi ngờ sẽ trừ bước
      },
      // GPS Anti-jump
      gps: {
        minDistance: 0.0005,         // 0.5m
        maxSpeed: 22,                // km/h (chạy bộ tối đa)
        maxJumpDistance: 0.035       // 35m (nếu nhảy quá xa trong 1 lần cập nhật -> loại)
      }
    };

    // ---------- STATE ----------
    let targetDistanceKm = 0.1;          // Sẽ random ngay
    let currentDistanceKm = 0.0;
    let steps = 0;
    let isActive = false;
    let isPaused = false;
    let startTime = null;
    let elapsedSeconds = 0;
    let timerInterval = null;
    
    // Kalman & GPS
    let kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
    let lastGpsTimestamp = null;
    let lastFusionTimestamp = null;
    let watchId = null;
    let lastValidPosition = null;
    
    // Pedometer anti-cheat
    let lastStepTime = 0;
    let shakeCounter = 0;
    let stepTrust = true;
    
    // Map
    let map;
    let userMarker;
    let pathPolyline;
    let pathCoordinates = [];
    
    // UI Elements
    const distanceEl = document.getElementById('distanceDisplay');
    const stepsEl = document.getElementById('stepsDisplay');
    const timerEl = document.getElementById('timerDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const gpsStatusEl = document.getElementById('gpsStatus');
    const stepTrustDisplay = document.getElementById('stepTrustDisplay');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const randomTargetBtn = document.getElementById('randomTargetBtn');
    const modalOverlay = document.getElementById('voucherModal');
    const voucherCodeEl = document.getElementById('voucherCode');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // ---------- RANDOM MỤC TIÊU ----------
    function generateRandomTarget() {
      const randomMeters = Math.floor(Math.random() * (300 - 50 + 1)) + 50;
      targetDistanceKm = randomMeters / 1000;
      targetDisplay.textContent = `🎲 ${randomMeters}m`;
      return randomMeters;
    }
    generateRandomTarget();

    // ---------- KALMAN FILTER ----------
    function kalmanUpdate(measuredLat, measuredLng, dt, accuracy) {
      if (kalman.lat === null) {
        kalman.lat = measuredLat;
        kalman.lng = measuredLng;
        return { lat: measuredLat, lng: measuredLng };
      }
      
      const R = Math.max(1, Math.min(50, accuracy)) * 0.5;
      const Q = CONFIG.kalman.Q * dt;
      
      // Predict
      let predLat = kalman.lat + kalman.vLat * dt;
      let predLng = kalman.lng + kalman.vLng * dt;
      let P = kalman.P + Q;
      
      // Update
      const K = P / (P + R);
      const innovLat = measuredLat - predLat;
      const innovLng = measuredLng - predLng;
      
      kalman.lat = predLat + K * innovLat;
      kalman.lng = predLng + K * innovLng;
      kalman.vLat = kalman.vLat + (K * innovLat) / dt;
      kalman.vLng = kalman.vLng + (K * innovLng) / dt;
      kalman.P = (1 - K) * P;
      
      return { lat: kalman.lat, lng: kalman.lng };
    }

    // ---------- PEDOMETER CHỐNG LẮC TAY ----------
    function initPedometer() {
      if (!window.DeviceMotionEvent) return;
      
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        document.body.addEventListener('click', function iosPerm() {
          DeviceMotionEvent.requestPermission().then(perm => {
            if (perm === 'granted') window.addEventListener('devicemotion', handleMotion);
          }).catch(console.error);
          document.body.removeEventListener('click', iosPerm);
        }, { once: true });
      } else {
        window.addEventListener('devicemotion', handleMotion);
      }
    }

    function handleMotion(event) {
      if (!isActive || isPaused) return;
      
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      
      const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
      const now = Date.now();
      
      // Phát hiện lắc tay quá mạnh
      if (magnitude > CONFIG.pedometer.shakePenaltyThreshold) {
        shakeCounter++;
        if (shakeCounter >= CONFIG.pedometer.maxShakeCount) {
          // Trừ bước nếu lắc quá nhiều
          steps = Math.max(0, steps - 2);
          shakeCounter = 0;
          stepTrust = false;
          stepTrustDisplay.innerHTML = '⚠️ Gian lận - đã trừ bước';
          stepTrustDisplay.style.color = '#f87171';
        }
        return; // không tính bước khi đang nghi ngờ lắc
      } else {
        shakeCounter = Math.max(0, shakeCounter - 1);
      }
      
      // Điều kiện đếm bước bình thường
      if (magnitude > CONFIG.pedometer.threshold && (now - lastStepTime) > CONFIG.pedometer.minStepInterval) {
        const stepFreq = 1000 / (now - lastStepTime);
        if (stepFreq < CONFIG.pedometer.maxStepFreq) {
          steps++;
          lastStepTime = now;
          stepTrust = true;
          stepTrustDisplay.innerHTML = '✅ Hợp lệ';
          stepTrustDisplay.style.color = '#4ade80';
          shakeCounter = 0;
        } else {
          // Tần suất quá nhanh -> cảnh báo
          stepTrustDisplay.innerHTML = '⚠️ Bước quá nhanh';
          stepTrustDisplay.style.color = '#fbbf24';
        }
      }
      updateUI();
    }

    // ---------- UTILS ----------
    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function updateUI() {
      distanceEl.textContent = Math.round(currentDistanceKm * 1000);
      stepsEl.textContent = steps;
      timerEl.textContent = formatTime(elapsedSeconds);
    }
    
    function updatePath(lat, lng) {
      if (!map) return;
      pathCoordinates.push([lat, lng]);
      if (pathPolyline) {
        pathPolyline.setLatLngs(pathCoordinates);
      } else {
        pathPolyline = L.polyline(pathCoordinates, {color: '#007bff', weight: 6, opacity: 0.9}).addTo(map);
      }
      
      let iconHtml = '<div style="background:#007bff; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px #007bff;"></div>';
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
        userMarker.setIcon(L.divIcon({className: 'custom-marker', html: iconHtml, iconSize:[20,20]}));
      } else {
        userMarker = L.marker([lat, lng], {icon: L.divIcon({className: 'custom-marker', html: iconHtml, iconSize:[20,20]})}).addTo(map);
      }
      map.setView([lat, lng], map.getZoom());
    }
    
    // ---------- GPS VỚI CHỐNG NHẢY ----------
    function handlePosition(position) {
      const { latitude, longitude, accuracy } = position.coords;
      const now = position.timestamp;
      lastGpsTimestamp = now;
      
      gpsStatusEl.innerHTML = accuracy < 30 ? `🛰️ GPS ${Math.round(accuracy)}m` : `⚠️ GPS yếu (${Math.round(accuracy)}m)`;
      
      let filteredLat = latitude, filteredLng = longitude;
      if (lastFusionTimestamp && kalman.lat !== null) {
        const dt = (now - lastFusionTimestamp) / 1000;
        if (dt > 0 && dt < 10) {
          const filtered = kalmanUpdate(latitude, longitude, dt, accuracy);
          filteredLat = filtered.lat;
          filteredLng = filtered.lng;
        }
      }
      lastFusionTimestamp = now;
      
      // Kiểm tra jump bất thường
      if (lastValidPosition) {
        const dist = haversine(lastValidPosition.lat, lastValidPosition.lng, filteredLat, filteredLng);
        const timeDiffHours = (now - lastValidPosition.timestamp) / 3600000;
        let valid = true;
        
        if (timeDiffHours > 0) {
          const speed = dist / timeDiffHours;
          if (speed > CONFIG.gps.maxSpeed) valid = false;
        }
        if (dist > CONFIG.gps.maxJumpDistance) valid = false;
        
        if (valid && isActive && !isPaused) {
          if (dist >= CONFIG.gps.minDistance && dist < 0.05) {
            currentDistanceKm += dist;
            lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
            updatePath(filteredLat, filteredLng);
          }
        } else {
          // Nếu không hợp lệ, bỏ qua điểm GPS này (vẫn hiển thị nhưng không cộng)
          gpsStatusEl.innerHTML += ' 🚫 Bỏ qua điểm nhảy';
          if (lastValidPosition) {
            filteredLat = lastValidPosition.lat;
            filteredLng = lastValidPosition.lng;
          }
        }
        
        if (currentDistanceKm >= targetDistanceKm) completeGoal();
      } else {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        updatePath(filteredLat, filteredLng);
      }
      
      updateUI();
    }
    
    function handlePositionError(err) {
      gpsStatusEl.innerHTML = `❌ Lỗi GPS: ${err.message}`;
    }
    
    function startWatchingGPS() {
      if (!navigator.geolocation) {
        alert('Trình duyệt không hỗ trợ GPS');
        return;
      }
      watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    }
    
    // ---------- ĐIỀU KHIỂN ----------
    function startActivity() {
      if (!watchId) startWatchingGPS();
      
      isActive = true;
      isPaused = false;
      if (!startTime) startTime = Date.now() - elapsedSeconds * 1000;
      else startTime = Date.now() - elapsedSeconds * 1000;
      
      timerInterval = setInterval(() => {
        if (isActive && !isPaused) {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }
      }, 200);
      
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
    }
    
    function pauseActivity() {
      if (!isActive) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
      } else {
        startTime = Date.now() - elapsedSeconds * 1000;
        timerInterval = setInterval(() => {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }, 200);
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      }
    }
    
    function stopActivity() {
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
    }
    
    function resetSession() {
      currentDistanceKm = 0;
      steps = 0;
      elapsedSeconds = 0;
      startTime = null;
      kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
      lastGpsTimestamp = null;
      lastFusionTimestamp = null;
      lastValidPosition = null;
      lastStepTime = 0;
      shakeCounter = 0;
      stepTrust = true;
      stepTrustDisplay.innerHTML = '✅ Hợp lệ';
      stepTrustDisplay.style.color = '#4ade80';
      pathCoordinates = [];
      if (pathPolyline) map.removeLayer(pathPolyline);
      pathPolyline = null;
      
      generateRandomTarget();
      updateUI();
    }
    
    function completeGoal() {
      if (!isActive) return;
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      stopBtn.disabled = true;
      
      const voucher = 'VTGO-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      voucherCodeEl.textContent = voucher;
      modalOverlay.style.visibility = 'visible';
    }
    
    // ---------- MAP ----------
    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false })
        .setView([10.3469, 107.0843], 17);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 21
      }).addTo(map);
      
      L.control.attribution({position: 'bottomleft'}).addTo(map);
      L.control.zoom({position: 'bottomright'}).addTo(map);
      
      navigator.geolocation.getCurrentPosition((pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        updatePath(pos.coords.latitude, pos.coords.longitude);
        gpsStatusEl.innerHTML = '📍 Sẵn sàng';
      }, ()=>{}, {enableHighAccuracy: true});
    }
    
    // ---------- EVENT LISTENERS ----------
    randomTargetBtn.addEventListener('click', () => {
      if (!isActive) generateRandomTarget();
    });
    
    startBtn.addEventListener('click', () => {
      if (!isActive) {
        if (currentDistanceKm === 0) resetSession();
        startActivity();
      }
    });
    
    pauseBtn.addEventListener('click', pauseActivity);
    stopBtn.addEventListener('click', stopActivity);
    
    closeModalBtn.addEventListener('click', () => {
      modalOverlay.style.visibility = 'hidden';
      resetSession();
    });
    
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.style.visibility = 'hidden';
    });
    
    // Khởi động
    initMap();
    startWatchingGPS();
    initPedometer();
    updateUI();
  })();
</script>
</body>
</html>
