<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏃 Chạy Bộ Sự Kiện - Theo Dõi & Nhận Voucher</title>
    
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Font Awesome & Google Font -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0f15;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        
        #app {
            width: 100%;
            max-width: 480px;
            background: #1a1f2b;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            height: 780px;
            max-height: 95vh;
        }
        
        /* Header */
        .header {
            padding: 20px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .title {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a0e9ff, #6cb4ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .target-selector {
            display: flex;
            gap: 8px;
            background: #252c3b;
            padding: 6px;
            border-radius: 40px;
        }
        
        .target-btn {
            background: transparent;
            border: none;
            color: #b0c4de;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .target-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 8px rgba(59,130,246,0.3);
        }
        
        .random-btn {
            background: #f97316;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-left: 8px;
            box-shadow: 0 4px 8px rgba(249,115,22,0.3);
        }
        
        /* Stats Panel */
        .stats-panel {
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            background: #212838;
            margin: 8px 16px;
            border-radius: 28px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            color: #f0f9ff;
        }
        
        .stat-label {
            font-size: 13px;
            color: #8a9bb5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Map container */
        .map-container {
            flex: 1;
            margin: 8px 16px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #2e3a4e;
            background: #1e2632;
            position: relative;
            min-height: 280px;
        }
        
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .gps-status {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #9cd49c;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        
        /* Control Buttons */
        .controls {
            display: flex;
            gap: 12px;
            padding: 20px 16px 25px;
            justify-content: center;
        }
        
        .ctrl-btn {
            flex: 1;
            padding: 16px 0;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            background: #2d3748;
            color: #e2e8f0;
            border: 1px solid #3e4c61;
        }
        
        .ctrl-btn.primary {
            background: #3b82f6;
            color: white;
            border: none;
        }
        
        .ctrl-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        
        /* Voucher Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
        }
        
        .modal-card {
            background: #1e293b;
            border-radius: 40px;
            padding: 30px 25px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            border: 2px solid #fbbf24;
            box-shadow: 0 30px 40px #00000055;
            animation: pop 0.3s;
        }
        
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .modal-icon {
            font-size: 64px;
            color: #fbbf24;
            margin-bottom: 15px;
        }
        
        .voucher-code {
            background: #0f172a;
            padding: 16px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #facc15;
            border: 2px dashed #fbbf24;
            margin: 20px 0;
        }
        
        .close-modal {
            background: #f97316;
            border: none;
            color: white;
            padding: 14px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* anti-cheat warning */
        .warning-tag {
            background: #ef4444;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            margin-left: 10px;
        }
        
        .step-source {
            font-size: 11px;
            color: #7e8ba3;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <span class="title"><i class="fas fa-running" style="margin-right: 6px;"></i>V-RUN</span>
        <div style="display: flex;">
            <div class="target-selector">
                <button class="target-btn" data-target="1">1km</button>
                <button class="target-btn" data-target="2">2km</button>
                <button class="target-btn active" data-target="3">3km</button>
                <button class="target-btn" data-target="5">5km</button>
            </div>
            <button class="random-btn" id="randomTargetBtn"><i class="fas fa-dice"></i></button>
        </div>
    </div>
    
    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-value" id="distanceDisplay">0.00</div>
            <div class="stat-label">KM <span id="targetHint"></span></div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="stepsDisplay">0</div>
            <div class="stat-label">BƯỚC <span id="stepTrustIcon"></span></div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="timerDisplay">00:00</div>
            <div class="stat-label">THỜI GIAN</div>
        </div>
    </div>
    
    <div class="map-container">
        <div id="map"></div>
        <div class="gps-status" id="gpsStatus">📍 Đang tìm GPS...</div>
    </div>
    
    <div class="controls">
        <button class="ctrl-btn" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
        <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
        <button class="ctrl-btn" id="stopBtn" disabled><i class="fas fa-stop"></i> KẾT THÚC</button>
    </div>
    <div style="padding: 0 20px 15px; font-size: 12px; color: #7c8ba0; display: flex; justify-content: space-between;">
        <span><i class="fas fa-shield-alt"></i> Chống gian lận: GPS + Cảm biến</span>
        <span id="cheatWarning" style="color: #f87171;"></span>
    </div>
</div>

<!-- Modal voucher -->
<div class="modal-overlay" id="voucherModal">
    <div class="modal-card">
        <div class="modal-icon">🏆</div>
        <h2 style="margin-bottom: 8px;">Chúc mừng!</h2>
        <p style="margin-bottom: 5px;">Bạn đã hoàn thành mục tiêu</p>
        <div class="voucher-code" id="voucherCode">LOADING...</div>
        <p style="margin-bottom: 20px;">Mã giảm giá đặc biệt cho bạn</p>
        <button class="close-modal" id="closeModalBtn">TIẾP TỤC</button>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- STATE ----------
        let targetDistance = 3.0; // km
        let currentDistance = 0.0; // km
        let steps = 0;
        let isActive = false;      // đang chạy
        let isPaused = false;
        let startTime = null;
        let elapsedSeconds = 0;
        let timerInterval = null;
        
        // GPS & Map
        let map;
        let userMarker;
        let pathPolyline;
        let pathCoordinates = [];
        let watchId = null;
        let lastPosition = null;
        let gpsAccuracy = null;
        
        // Sensors
        let motionListenerActive = false;
        let stepDetectionEnabled = true;
        let lastStepTimestamp = 0;
        const STEP_MIN_INTERVAL = 250; // ms giữa các bước
        
        // Bộ lọc bước chân (đơn giản nhưng chống rung)
        let accBuffer = [];
        let lastMagnitude = 0;
        const STEP_THRESHOLD = 1.2; // ngưỡng gia tốc (m/s^2) dựa trên thử nghiệm
        
        // Chống gian lận
        let suspiciousActivity = 0;
        let stepCalibrationFactor = 0.8; // mỗi bước ~0.8m, sẽ cập nhật động nếu có GPS
        
        // Timer display refs
        const distanceEl = document.getElementById('distanceDisplay');
        const stepsEl = document.getElementById('stepsDisplay');
        const timerEl = document.getElementById('timerDisplay');
        const targetHint = document.getElementById('targetHint');
        const gpsStatusEl = document.getElementById('gpsStatus');
        const cheatWarningEl = document.getElementById('cheatWarning');
        const stepTrustIcon = document.getElementById('stepTrustIcon');
        
        // Buttons
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const targetBtns = document.querySelectorAll('.target-btn');
        const randomTargetBtn = document.getElementById('randomTargetBtn');
        
        // Modal
        const modalOverlay = document.getElementById('voucherModal');
        const voucherCodeEl = document.getElementById('voucherCode');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        // ---------- UTILS ----------
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
        
        function updateUI() {
            distanceEl.textContent = currentDistance.toFixed(2);
            stepsEl.textContent = steps;
            targetHint.textContent = `/ ${targetDistance.toFixed(1)} km`;
            if (isActive && !isPaused) {
                // timer update từ interval
            }
            timerEl.textContent = formatTime(elapsedSeconds);
            
            // Cập nhật trạng thái tin cậy
            if (gpsAccuracy && gpsAccuracy < 30) {
                stepTrustIcon.innerHTML = '<i class="fas fa-check-circle" style="color:#4ade80;"></i>';
            } else {
                stepTrustIcon.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#fbbf24;"></i>';
            }
        }
        
        // Haversine distance (km)
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        // Cập nhật đường đi trên map
        function updatePath(lat, lng) {
            if (!map) return;
            pathCoordinates.push([lat, lng]);
            if (pathPolyline) {
                pathPolyline.setLatLngs(pathCoordinates);
            } else {
                pathPolyline = L.polyline(pathCoordinates, {color: '#3b82f6', weight: 6, opacity: 0.9}).addTo(map);
            }
            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
            } else {
                userMarker = L.marker([lat, lng], {
                    icon: L.divIcon({className: 'custom-marker', html: '<div style="background:#3b82f6; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px #3b82f6;"></div>', iconSize:[20,20]})
                }).addTo(map);
            }
            map.setView([lat, lng], map.getZoom());
        }
        
        // Xử lý GPS
        function handlePosition(position) {
            const { latitude, longitude, accuracy } = position.coords;
            gpsAccuracy = accuracy;
            gpsStatusEl.innerHTML = accuracy < 30 ? '📍 GPS chính xác' : `⚠️ GPS yếu (${Math.round(accuracy)}m)`;
            
            if (!lastPosition) {
                lastPosition = { lat: latitude, lng: longitude };
                updatePath(latitude, longitude);
                return;
            }
            
            if (isActive && !isPaused) {
                const dist = haversine(lastPosition.lat, lastPosition.lng, latitude, longitude);
                // Chống gian lận: nếu tốc độ > 30 km/h thì coi là bất thường
                const timeDiff = position.timestamp - (lastPosition.timestamp || position.timestamp-1000);
                const speedKmh = (dist / (timeDiff/3600000)) || 0;
                
                if (speedKmh > 20 && dist > 0.05) {
                    suspiciousActivity++;
                    cheatWarningEl.textContent = '⚠️ Phát hiện di chuyển nhanh bất thường';
                    // không cộng distance nếu nghi ngờ
                } else {
                    // Cộng dồn distance
                    if (dist < 0.1 && dist > 0.001) { // lọc nhiễu
                        currentDistance += dist;
                        // Hiệu chỉnh bước dựa trên GPS
                        if (steps > 10 && currentDistance > 0.1) {
                            stepCalibrationFactor = currentDistance * 1000 / steps;
                        }
                    }
                    suspiciousActivity = Math.max(0, suspiciousActivity-1);
                    if (suspiciousActivity===0) cheatWarningEl.textContent = '';
                }
                
                lastPosition = { lat: latitude, lng: longitude, timestamp: position.timestamp };
                updatePath(latitude, longitude);
                
                // Kiểm tra đạt mục tiêu
                if (currentDistance >= targetDistance && isActive) {
                    completeGoal();
                }
            } else {
                lastPosition = { lat: latitude, lng: longitude };
                updatePath(latitude, longitude);
            }
            updateUI();
        }
        
        function handlePositionError(err) {
            gpsStatusEl.innerHTML = '❌ Lỗi GPS: ' + err.message;
        }
        
        function startWatchingGPS() {
            if (!navigator.geolocation) {
                alert('Trình duyệt không hỗ trợ GPS');
                return;
            }
            watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
                enableHighAccuracy: true,
                maximumAge: 2000,
                timeout: 5000
            });
        }
        
        // ---------- CẢM BIẾN CHUYỂN ĐỘNG (CHỐNG GIAN LẬN) ----------
        function initMotionTracking() {
            if (!window.DeviceMotionEvent) {
                console.warn("Thiết bị không hỗ trợ cảm biến chuyển động");
                return;
            }
            
            // Yêu cầu quyền cho iOS
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                // iOS cần user gesture
                document.body.addEventListener('click', function iosPerm() {
                    DeviceMotionEvent.requestPermission().then(perm => {
                        if (perm === 'granted') {
                            startMotionListener();
                        }
                    }).catch(console.error);
                    document.body.removeEventListener('click', iosPerm);
                }, { once: true });
            } else {
                startMotionListener();
            }
        }
        
        function startMotionListener() {
            if (motionListenerActive) return;
            window.addEventListener('devicemotion', handleDeviceMotion);
            motionListenerActive = true;
        }
        
        function handleDeviceMotion(event) {
            if (!isActive || isPaused) return;
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;
            
            const { x, y, z } = acc;
            const magnitude = Math.sqrt(x*x + y*y + z*z);
            
            // Lọc đơn giản
            if (accBuffer.length < 3) {
                accBuffer.push(magnitude);
                lastMagnitude = magnitude;
                return;
            }
            
            const avg = accBuffer.reduce((a,b)=>a+b,0)/accBuffer.length;
            accBuffer.shift();
            accBuffer.push(magnitude);
            
            const diff = magnitude - avg;
            const now = Date.now();
            
            // Phát hiện đỉnh bước
            if (diff > STEP_THRESHOLD && (now - lastStepTimestamp) > STEP_MIN_INTERVAL) {
                // Kiểm tra thêm chống gian lận: nếu tần số quá cao (>4 bước/giây)
                const stepFreq = 1000 / (now - lastStepTimestamp);
                if (stepFreq > 4.5) {
                    suspiciousActivity += 2;
                    cheatWarningEl.textContent = '🚫 Gian lận: lắc tay quá nhanh';
                    return;
                }
                
                steps++;
                lastStepTimestamp = now;
                
                // Nếu GPS kém, dùng bước để ước lượng quãng đường
                if (gpsAccuracy && gpsAccuracy > 50 && isActive && !isPaused) {
                    const estDistance = steps * stepCalibrationFactor / 1000;
                    if (estDistance > currentDistance) {
                        currentDistance = estDistance;
                    }
                }
                
                updateUI();
                if (currentDistance >= targetDistance) completeGoal();
            }
            lastMagnitude = magnitude;
        }
        
        // ---------- ĐIỀU KHIỂN HOẠT ĐỘNG ----------
        function startActivity() {
            if (!watchId) startWatchingGPS();
            if (!motionListenerActive) startMotionListener();
            
            isActive = true;
            isPaused = false;
            if (!startTime) {
                startTime = Date.now() - elapsedSeconds * 1000;
            } else {
                startTime = Date.now() - elapsedSeconds * 1000;
            }
            
            timerInterval = setInterval(() => {
                if (isActive && !isPaused) {
                    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                    updateUI();
                }
            }, 200);
            
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            updateUI();
        }
        
        function pauseActivity() {
            if (!isActive) return;
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(timerInterval);
                pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
            } else {
                startTime = Date.now() - elapsedSeconds * 1000;
                timerInterval = setInterval(() => {
                    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                    updateUI();
                }, 200);
                pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
            }
        }
        
        function stopActivity() {
            isActive = false;
            isPaused = false;
            clearInterval(timerInterval);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
            // Không reset distance/steps
        }
        
        function resetSession() {
            currentDistance = 0;
            steps = 0;
            elapsedSeconds = 0;
            startTime = null;
            pathCoordinates = [];
            if (pathPolyline) map.removeLayer(pathPolyline);
            pathPolyline = null;
            suspiciousActivity = 0;
            cheatWarningEl.textContent = '';
            updateUI();
        }
        
        function completeGoal() {
            if (!isActive) return;
            isActive = false;
            isPaused = false;
            clearInterval(timerInterval);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
            
            // Tạo mã voucher
            const voucher = 'VRUN-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            voucherCodeEl.textContent = voucher;
            modalOverlay.style.visibility = 'visible';
        }
        
        // ---------- KHỞI TẠO MAP ----------
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([21.0285, 105.8542], 15); // Hà Nội mặc định
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            
            L.control.attribution({position: 'bottomleft'}).addTo(map);
            L.control.zoom({position: 'bottomright'}).addTo(map);
            
            // Thử lấy vị trí hiện tại
            navigator.geolocation.getCurrentPosition((pos) => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                updatePath(pos.coords.latitude, pos.coords.longitude);
                gpsStatusEl.innerHTML = '📍 Sẵn sàng';
            }, ()=>{}, {enableHighAccuracy: true});
        }
        
        // ---------- XỬ LÝ SỰ KIỆN UI ----------
        targetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                targetBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetDistance = parseFloat(btn.dataset.target);
                targetHint.textContent = `/ ${targetDistance.toFixed(1)} km`;
            });
        });
        
        randomTargetBtn.addEventListener('click', () => {
            const options = [1, 2, 3, 5];
            const rand = options[Math.floor(Math.random() * options.length)];
            targetDistance = rand;
            targetBtns.forEach(b => {
                if (parseFloat(b.dataset.target) === rand) b.classList.add('active');
                else b.classList.remove('active');
            });
            targetHint.textContent = `/ ${targetDistance.toFixed(1)} km`;
        });
        
        startBtn.addEventListener('click', () => {
            if (!isActive) {
                if (currentDistance === 0) resetSession();
                startActivity();
            }
        });
        
        pauseBtn.addEventListener('click', pauseActivity);
        stopBtn.addEventListener('click', () => {
            stopActivity();
            // Không reset ngay
        });
        
        closeModalBtn.addEventListener('click', () => {
            modalOverlay.style.visibility = 'hidden';
            resetSession();
        });
        
        // Đóng modal khi click overlay
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.style.visibility = 'hidden';
        });
        
        // Khởi động mọi thứ
        initMap();
        initMotionTracking();
        startWatchingGPS(); // bắt đầu theo dõi nền
        
        // Khởi tạo bộ đệm cảm biến
        accBuffer = [9.8, 9.8, 9.8];
        updateUI();
    })();
</script>
</body>
</html>
