<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏃 VungTauGO! - GPS Chuẩn + Kalman</title>
  
  <!-- Leaflet CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Font Awesome & Google Font -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f15;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }
    #app {
      width: 100%;
      max-width: 480px;
      background: #1a1f2b;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 800px;
      max-height: 95vh;
    }
    .header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(135deg, #00e5ff, #007bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .mode-badge {
      background: #252c3b;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .target-selector {
      display: flex;
      gap: 8px;
      margin: 10px 20px;
    }
    .target-btn {
      flex: 1;
      background: #252c3b;
      border: none;
      color: #b0c4de;
      font-weight: 600;
      font-size: 14px;
      padding: 10px;
      border-radius: 30px;
      cursor: pointer;
    }
    .target-btn.active {
      background: #007bff;
      color: white;
    }
    .stats-panel {
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      background: #212838;
      margin: 8px 16px;
      border-radius: 28px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #f0f9ff;
    }
    .stat-label {
      font-size: 12px;
      color: #8a9bb5;
      text-transform: uppercase;
    }
    .map-container {
      flex: 1;
      margin: 8px 16px;
      border-radius: 24px;
      overflow: hidden;
      border: 2px solid #2e3a4e;
      background: #1e2632;
      position: relative;
      min-height: 250px;
    }
    #map { width: 100%; height: 100%; z-index: 1; }
    .gps-status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #9cd49c;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .controls {
      display: flex;
      gap: 12px;
      padding: 20px 16px 25px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 16px 0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      background: #2d3748;
      color: #e2e8f0;
    }
    .ctrl-btn.primary {
      background: #007bff;
      color: white;
    }
    .ctrl-btn:disabled { opacity: 0.4; pointer-events: none; }
    .footnote {
      padding: 0 20px 15px;
      font-size: 11px;
      color: #7c8ba0;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="title"><i class="fas fa-map-pin"></i> VungTauGO!</span>
    <div class="mode-badge" id="modeBadge">
      <i class="fas fa-satellite"></i> <span id="modeText">GPS Kalman</span>
    </div>
  </div>
  
  <div class="target-selector">
    <button class="target-btn" data-target="0.5">500m</button>
    <button class="target-btn active" data-target="1.0">1km</button>
    <button class="target-btn" data-target="2.0">2km</button>
    <button class="target-btn" data-target="3.0">3km</button>
  </div>
  
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-value" id="stepsDisplay">0</div>
      <div class="stat-label">BƯỚC</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="distanceDisplay">0.00</div>
      <div class="stat-label">KM <span id="targetHint">/ 1.0</span></div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="speedDisplay">0.0</div>
      <div class="stat-label">KM/H</div>
    </div>
  </div>
  
  <div class="map-container">
    <div id="map"></div>
    <div class="gps-status" id="gpsStatus">🛰️ Đang khởi tạo...</div>
  </div>
  
  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn"><i class="fas fa-play"></i> BẮT ĐẦU</button>
    <button class="ctrl-btn" id="pauseBtn" disabled><i class="fas fa-pause"></i> TẠM DỪNG</button>
    <button class="ctrl-btn" id="resetBtn" disabled><i class="fas fa-undo-alt"></i> ĐẶT LẠI</button>
  </div>
  <div class="footnote">
    <span><i class="fas fa-microchip"></i> Kalman Filter + Chống drift</span>
    <span>🏆 VungTauGO! Pro</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CẤU HÌNH KỸ THUẬT ----------
    const CONFIG = {
      gps: {
        maxAccuracy: 30,           // mét - bỏ qua điểm có accuracy > 30
        maxSpeed: 2.5,             // m/s (≈9 km/h) - giới hạn tốc độ đi bộ/chạy
        minDistance: 0.5,          // mét - khoảng cách tối thiểu để cập nhật
        updateInterval: 1500       // ms - tần suất yêu cầu GPS (watchPosition tự động)
      },
      kalman: {
        Q: 0.1,                    // process noise (độ tin tưởng mô hình)
        R: 5,                      // measurement noise (độ tin tưởng GPS)
        P: 1                       // initial error covariance
      },
      pedometer: {
        threshold: 11.5,           // ngưỡng gia tốc phát hiện bước (m/s²)
        minStepInterval: 280,      // ms
        maxStepFreq: 3.5,          // bước/giây tối đa
        stepLength: 0.8            // mét/bước (ước lượng)
      }
    };

    // ---------- STATE ----------
    let targetDistanceKm = 1.0;
    let currentDistanceKm = 0.0;
    let steps = 0;
    let isActive = false;
    let isPaused = false;
    let startTime = null;
    let elapsedSeconds = 0;
    let timerInterval = null;
    let currentSpeed = 0.0;
    
    // Kalman Filter state
    let kalman = {
      lat: null, lng: null,
      vLat: 0, vLng: 0,
      P: CONFIG.kalman.P
    };
    
    // GPS & Map
    let watchId = null;
    let lastValidPosition = null;      // vị trí đã qua filter, dùng để tính quãng đường
    let lastMapUpdatePosition = null;  // vị trí cuối cùng vẽ lên bản đồ
    let lastGpsTimestamp = null;
    let map;
    let userMarker;
    let pathPolyline;
    let pathCoordinates = [];
    
    // Pedometer
    let lastStepTime = 0;
    let motionListenerActive = false;
    
    // UI Elements
    const stepsEl = document.getElementById('stepsDisplay');
    const distanceEl = document.getElementById('distanceDisplay');
    const speedEl = document.getElementById('speedDisplay');
    const targetHint = document.getElementById('targetHint');
    const gpsStatusEl = document.getElementById('gpsStatus');
    const modeText = document.getElementById('modeText');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const targetBtns = document.querySelectorAll('.target-btn');

    // ---------- UTILS ----------
    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    
    // Haversine distance (mét)
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function updateUI() {
      distanceEl.textContent = currentDistanceKm.toFixed(2);
      stepsEl.textContent = steps;
      speedEl.textContent = currentSpeed.toFixed(1);
      targetHint.textContent = `/ ${targetDistanceKm.toFixed(1)} km`;
    }
    
    // ---------- KALMAN FILTER ----------
    function kalmanUpdate(measuredLat, measuredLng, dt) {
      if (kalman.lat === null) {
        kalman.lat = measuredLat;
        kalman.lng = measuredLng;
        return { lat: measuredLat, lng: measuredLng };
      }
      
      const Q = CONFIG.kalman.Q * dt;
      const R = CONFIG.kalman.R;
      
      // Predict
      let predLat = kalman.lat + kalman.vLat * dt;
      let predLng = kalman.lng + kalman.vLng * dt;
      let P = kalman.P + Q;
      
      // Update
      const K = P / (P + R);
      const innovLat = measuredLat - predLat;
      const innovLng = measuredLng - predLng;
      
      kalman.lat = predLat + K * innovLat;
      kalman.lng = predLng + K * innovLng;
      kalman.vLat = kalman.vLat + (K * innovLat) / dt;
      kalman.vLng = kalman.vLng + (K * innovLng) / dt;
      kalman.P = (1 - K) * P;
      
      return { lat: kalman.lat, lng: kalman.lng };
    }
    
    // ---------- VẼ BẢN ĐỒ ----------
    function updatePath(lat, lng) {
      if (!map) return;
      
      // Chỉ vẽ nếu khoảng cách đủ lớn (tránh vẽ quá dày)
      if (lastMapUpdatePosition) {
        const dist = haversine(lastMapUpdatePosition.lat, lastMapUpdatePosition.lng, lat, lng);
        if (dist < 0.5) return; // dưới 0.5m không vẽ thêm điểm
      }
      
      pathCoordinates.push([lat, lng]);
      if (pathPolyline) {
        pathPolyline.setLatLngs(pathCoordinates);
      } else {
        pathPolyline = L.polyline(pathCoordinates, {color: '#007bff', weight: 5, opacity: 0.9}).addTo(map);
      }
      
      const iconHtml = '<div style="background:#007bff; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px #007bff;"></div>';
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
        userMarker.setIcon(L.divIcon({className: 'custom-marker', html: iconHtml, iconSize:[20,20]}));
      } else {
        userMarker = L.marker([lat, lng], {icon: L.divIcon({className: 'custom-marker', html: iconHtml, iconSize:[20,20]})}).addTo(map);
      }
      map.setView([lat, lng], map.getZoom());
      lastMapUpdatePosition = { lat, lng };
    }
    
    // ---------- XỬ LÝ GPS ----------
    function handlePosition(position) {
      const { latitude, longitude, accuracy } = position.coords;
      const now = position.timestamp;
      
      // 1. Lọc theo accuracy
      if (accuracy > CONFIG.gps.maxAccuracy) {
        gpsStatusEl.innerHTML = `⚠️ GPS yếu (${Math.round(accuracy)}m) - giữ vị trí cũ`;
        return;
      }
      
      gpsStatusEl.innerHTML = `🛰️ GPS ${Math.round(accuracy)}m`;
      
      // 2. Kalman Filter
      let filteredLat = latitude, filteredLng = longitude;
      if (lastGpsTimestamp && kalman.lat !== null) {
        const dt = (now - lastGpsTimestamp) / 1000;
        if (dt > 0 && dt < 10) {
          const filtered = kalmanUpdate(latitude, longitude, dt);
          filteredLat = filtered.lat;
          filteredLng = filtered.lng;
        }
      }
      lastGpsTimestamp = now;
      
      // 3. Chống nhảy vị trí & tính quãng đường
      if (lastValidPosition) {
        const dist = haversine(lastValidPosition.lat, lastValidPosition.lng, filteredLat, filteredLng);
        const timeDiff = (now - lastValidPosition.timestamp) / 1000;
        let valid = true;
        
        // Tính tốc độ (m/s)
        if (timeDiff > 0) {
          const speed = dist / timeDiff;
          currentSpeed = speed * 3.6; // km/h
          
          // Nếu tốc độ > maxSpeed hoặc nhảy bất thường
          if (speed > CONFIG.gps.maxSpeed || dist > 15) {
            valid = false;
            gpsStatusEl.innerHTML += ' 🚫 Bỏ qua điểm nhảy';
          }
        }
        
        if (valid && isActive && !isPaused) {
          if (dist >= CONFIG.gps.minDistance) {
            currentDistanceKm += dist / 1000;
            lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
          }
        } else if (!valid) {
          // Giữ vị trí cũ, không cập nhật lastValidPosition
        } else {
          lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
        }
      } else {
        lastValidPosition = { lat: filteredLat, lng: filteredLng, timestamp: now };
      }
      
      // 4. Cập nhật bản đồ với vị trí đã filter
      if (lastValidPosition) {
        updatePath(lastValidPosition.lat, lastValidPosition.lng);
      }
      
      updateUI();
      
      // Kiểm tra hoàn thành mục tiêu
      if (currentDistanceKm >= targetDistanceKm && isActive) {
        completeGoal();
      }
    }
    
    function handlePositionError(err) {
      console.warn(err);
      let msg = '❌ Lỗi GPS';
      if (err.code === 1) msg = '🚫 Quyền vị trí bị từ chối';
      else if (err.code === 2) msg = '📡 Không có tín hiệu';
      else if (err.code === 3) msg = '⏳ Timeout';
      gpsStatusEl.innerHTML = msg;
    }
    
    function startWatchingGPS() {
      if (!navigator.geolocation) {
        alert('Trình duyệt không hỗ trợ GPS');
        return;
      }
      watchId = navigator.geolocation.watchPosition(handlePosition, handlePositionError, {
        enableHighAccuracy: true,
        maximumAge: 0,           // không dùng cache
        timeout: 5000
      });
    }
    
    // ---------- PEDOMETER (ĐẾM BƯỚC) ----------
    function initPedometer() {
      if (!window.DeviceMotionEvent) return;
      
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        document.body.addEventListener('click', function iosPerm() {
          DeviceMotionEvent.requestPermission().then(perm => {
            if (perm === 'granted') {
              window.addEventListener('devicemotion', handleMotion);
              motionListenerActive = true;
            }
          }).catch(console.error);
          document.body.removeEventListener('click', iosPerm);
        }, { once: true });
      } else {
        window.addEventListener('devicemotion', handleMotion);
        motionListenerActive = true;
      }
    }
    
    function handleMotion(event) {
      if (!isActive || isPaused) return;
      
      const acc = event.accelerationIncludingGravity;
      if (!acc) return;
      
      const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
      const now = Date.now();
      
      // Phát hiện bước dựa trên ngưỡng
      if (magnitude > CONFIG.pedometer.threshold && (now - lastStepTime) > CONFIG.pedometer.minStepInterval) {
        const stepFreq = 1000 / (now - lastStepTime);
        if (stepFreq < CONFIG.pedometer.maxStepFreq) {
          steps++;
          lastStepTime = now;
          updateUI();
        }
      }
    }
    
    // ---------- ĐIỀU KHIỂN ----------
    function startActivity() {
      if (!watchId) startWatchingGPS();
      if (!motionListenerActive) initPedometer();
      
      isActive = true;
      isPaused = false;
      if (!startTime) startTime = Date.now() - elapsedSeconds * 1000;
      else startTime = Date.now() - elapsedSeconds * 1000;
      
      timerInterval = setInterval(() => {
        if (isActive && !isPaused) {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }
      }, 200);
      
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      resetBtn.disabled = false;
    }
    
    function pauseActivity() {
      if (!isActive) return;
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(timerInterval);
        pauseBtn.innerHTML = '<i class="fas fa-play"></i> TIẾP TỤC';
      } else {
        startTime = Date.now() - elapsedSeconds * 1000;
        timerInterval = setInterval(() => {
          elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
          updateUI();
        }, 200);
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      }
    }
    
    function resetActivity() {
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      
      // Reset state
      currentDistanceKm = 0;
      steps = 0;
      elapsedSeconds = 0;
      currentSpeed = 0;
      startTime = null;
      kalman = { lat: null, lng: null, vLat: 0, vLng: 0, P: CONFIG.kalman.P };
      lastValidPosition = null;
      lastMapUpdatePosition = null;
      lastGpsTimestamp = null;
      lastStepTime = 0;
      pathCoordinates = [];
      if (pathPolyline) map.removeLayer(pathPolyline);
      pathPolyline = null;
      
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      resetBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="fas fa-pause"></i> TẠM DỪNG';
      
      updateUI();
      gpsStatusEl.innerHTML = '🛰️ Sẵn sàng';
    }
    
    function completeGoal() {
      if (!isActive) return;
      isActive = false;
      isPaused = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      resetBtn.disabled = false;
      alert(`🎉 Chúc mừng! Bạn đã hoàn thành ${targetDistanceKm} km!`);
    }
    
    // ---------- KHỞI TẠO MAP ----------
    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false })
        .setView([10.3469, 107.0843], 17);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', maxZoom: 21
      }).addTo(map);
      
      L.control.attribution({position: 'bottomleft'}).addTo(map);
      L.control.zoom({position: 'bottomright'}).addTo(map);
      
      navigator.geolocation.getCurrentPosition((pos) => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
        updatePath(pos.coords.latitude, pos.coords.longitude);
        gpsStatusEl.innerHTML = '📍 Sẵn sàng';
      }, ()=>{}, {enableHighAccuracy: true});
    }
    
    // ---------- EVENT LISTENERS ----------
    targetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        targetBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        targetDistanceKm = parseFloat(btn.dataset.target);
        targetHint.textContent = `/ ${targetDistanceKm.toFixed(1)} km`;
      });
    });
    
    startBtn.addEventListener('click', startActivity);
    pauseBtn.addEventListener('click', pauseActivity);
    resetBtn.addEventListener('click', resetActivity);
    
    // Khởi động
    initMap();
    startWatchingGPS();
    initPedometer();
    updateUI();
  })();
</script>
</body>
</html>
