<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VUNGTAUGO! Ultimate Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #050a14; --card: #111827; }
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: #fff; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container {
            width: 90%; max-width: 400px; background: var(--card);
            border-radius: 40px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center;
        }
        .main-stat { margin: 20px 0; }
        .step-count { font-size: 72px; font-weight: 800; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .distance-sub { font-size: 18px; color: var(--primary); font-weight: 600; margin-top: 10px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; font-size: 13px; color: #94a3b8; }
        .stat-item b { display: block; font-size: 18px; color: #fff; }
        .btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none; color: #fff; padding: 20px; border-radius: 20px;
            width: 100%; font-size: 18px; font-weight: 700; cursor: pointer;
            margin-top: 30px; transition: 0.3s;
        }
        .status { font-size: 11px; margin-top: 15px; color: #4b5563; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #374151; }
        .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="start-screen">
        <h1 style="font-size: 24px;">VUNGTAUGO!</h1>
        <p style="color: #94a3b8;">Hệ thống Hybrid Tracking chuyên nghiệp</p>
        <button class="btn" onclick="requestPermissions()">BẮT ĐẦU THỬ THÁCH</button>
    </div>

    <div id="tracking-screen" style="display:none;">
        <div class="main-stat">
            <span class="step-count" id="steps">0</span>
            <div style="font-size: 14px; letter-spacing: 3px; color: #64748b;">BƯỚC CHÂN</div>
            <div class="distance-sub">≈ <span id="meters">0</span> Mét</div>
        </div>

        <div class="grid-stats">
            <div class="stat-item">Mục tiêu<b><span id="target-m">--</span> m</b></div>
            <div class="stat-item">Độ chính xác<b>±<span id="acc">--</span>m</b></div>
        </div>

        <div class="status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">Đang đợi dữ liệu cảm biến...</span>
        </div>
    </div>
</div>

<script>
    let state = {
        steps: 0,
        meters: 0,
        target: 0,
        lastAcc: 0,
        lastMag: 0,
        isTracking: false,
        lastLat: null,
        lastLon: null
    };

    // 1. Cấp quyền cảm biến (Bắt buộc cho iOS 13+)
    async function requestPermissions() {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== 'granted') return alert("Bạn cần cho phép truy cập cảm biến để đếm bước!");
        }
        startChallenge();
    }

    function startChallenge() {
        state.target = [30, 40, 50][Math.floor(Math.random() * 3)];
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('tracking-screen').style.display = 'block';
        document.getElementById('target-m').innerText = state.target;
        document.getElementById('status-dot').classList.add('active');
        state.isTracking = true;

        initMotion();
        initGPS();
    }

    // 2. Đếm bước chân bằng Gia tốc kế (Accelerometer)
    function initMotion() {
        window.addEventListener('devicemotion', (event) => {
            if (!state.isTracking) return;
            
            let acc = event.accelerationIncludingGravity;
            let magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            // Thuật toán đếm bước: Nhận diện đỉnh dao động (Peak detection)
            let delta = Math.abs(magnitude - state.lastMag);
            if (delta > 3) { // Ngưỡng lực của 1 bước đi bộ
                state.steps++;
                document.getElementById('steps').innerText = state.steps;
            }
            state.lastMag = magnitude;
        });
    }

    // 3. Đo quãng đường bằng GPS độ chính xác cao
    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            document.getElementById('acc').innerText = Math.round(accuracy);

            if (accuracy > 30) {
                document.getElementById('status-text').innerText = "GPS yếu, hãy di chuyển...";
                return;
            }

            document.getElementById('status-text').innerText = "Đang đồng bộ cảm biến...";

            if (state.lastLat) {
                let d = calculateDistance(state.lastLat, state.lastLon, latitude, longitude);
                // Chỉ tính nếu đi trên 2m và dưới 20m (chống nhiễu & chống đi xe)
                if (d > 2 && d < 20) {
                    state.meters += d;
                    document.getElementById('meters').innerText = Math.floor(state.meters);
                    checkWin();
                }
            }
            state.lastLat = latitude;
            state.lastLon = longitude;
        }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkWin() {
        if (state.meters >= state.target) {
            state.isTracking = false;
            Swal.fire({
                title: 'THÀNH CÔNG!',
                html: `Bạn đã đi được <b>${Math.floor(state.meters)}m</b> (~${state.steps} bước).<br>Đưa màn hình cho nhân viên để nhận quà!`,
                icon: 'success',
                confirmButtonText: 'NHẬN QUÀ'
            });
        }
    }
</script>

</body>
</html>
