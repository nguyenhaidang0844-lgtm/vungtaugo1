<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VUNGTAUGO! Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #050a14; --card: rgba(30, 41, 59, 0.7); --danger: #ff4d4d; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #050a14);
            color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { 
            width: 90%; max-width: 380px; background: var(--card); border-radius: 35px; 
            padding: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .step-txt { font-size: 85px; font-weight: 800; line-height: 1; margin: 10px 0; background: linear-gradient(#fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .meter-sub { font-size: 24px; color: var(--primary); font-weight: 600; margin-bottom: 20px; }
        .btn { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            border: none; color: #fff; padding: 20px; border-radius: 20px; 
            width: 100%; font-size: 18px; font-weight: 800; cursor: pointer;
        }
        .status-box { 
            margin-top: 20px; padding: 12px; border-radius: 15px; background: rgba(0,0,0,0.2);
            font-size: 11px; color: #94a3b8; min-height: 50px;
        }
        .warning { color: var(--danger) !important; font-weight: bold; }
        .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1 style="margin:0">VUNGTAUGO!</h1>
        <p style="color:#64748b; margin-bottom:30px">Xác thực di chuyển thực tế 1:1</p>
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; margin-bottom:25px">
            <span style="font-size:12px; color:#475569">MỤC TIÊU BỐC THĂM</span>
            <div id="target-draw" style="font-size:28px; font-weight:800; color:var(--primary)">?? MÉT</div>
        </div>
        <button class="btn" id="main-btn" onclick="handleStart()">BỐC THĂM</button>
    </div>

    <div id="track-screen" style="display:none">
        <div style="font-size:12px; letter-spacing:2px; color:#64748b">BƯỚC CHÂN</div>
        <div class="step-txt" id="steps">0</div>
        <div class="meter-sub"><span id="meters">0</span> / <span id="goal">0</span> m</div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div class="status-box">
            <div id="msg">Đang khởi tạo GPS...</div>
            <div id="debug" style="font-size:9px; margin-top:5px; opacity:0.5">Vận tốc: 0 km/h</div>
        </div>
    </div>

    <div id="finish-screen" style="display:none">
        <h2 style="color:var(--primary)">XÁC THỰC THÀNH CÔNG</h2>
        <div style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin:15px 0">
            <img id="qr" src="" style="width:180px">
        </div>
        <div id="code" style="font-weight:800; letter-spacing:2px; font-size: 20px;"></div>
        <button class="btn" style="margin-top:20px; background:#334155" onclick="location.reload()">KẾT THÚC</button>
    </div>
</div>

<script>
    let state = {
        target: 0, steps: 0, 
        gpsDistance: 0, // Quãng đường GPS tích lũy
        isLive: false,
        lastLat: null, lastLon: null,
        lastStepTime: 0, lastG: 9.8,
        gpsConfidence: 0 // Điểm tin cậy di chuyển
    };

    function handleStart() {
        if (state.target === 0) {
            state.target = [20, 30, 40][Math.floor(Math.random() * 3)];
            document.getElementById('target-draw').innerText = state.target + " MÉT";
            document.getElementById('main-btn').innerText = "BẮT ĐẦU DI CHUYỂN";
        } else {
            requestPermissions();
        }
    }

    async function requestPermissions() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }
        navigator.geolocation.watchPosition(handleGPS, (e) => console.error(e), { enableHighAccuracy: true });
        startApp();
    }

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('track-screen').style.display = 'block';
        document.getElementById('goal').innerText = state.target;
        state.isLive = true;
        window.addEventListener('devicemotion', handleMotion);
    }

    function handleMotion(e) {
        if (!state.isLive) return;
        let acc = e.accelerationIncludingGravity;
        if (!acc || !acc.x) return;

        let g = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        let delta = Math.abs(g - state.lastG);
        let now = Date.now();

        // CHỐNG LẮC: Lực vẩy tay mạnh (>25) sẽ bị bỏ qua
        if (g > 25) {
            updateStatus("PHÁT HIỆN RUNG LẮC QUÁ MẠNH", true);
            return;
        }

        // Đếm bước khi lực vừa đủ (đi bộ)
        if (delta > 2.4 && (now - state.lastStepTime > 380)) {
            // CHỈ TĂNG BƯỚC KHI CÓ GPS XÁC NHẬN ĐANG DI CHUYỂN (hoặc có độ tin cậy)
            if (state.gpsConfidence > 0.1) {
                state.steps++;
                state.lastStepTime = now;
                updateUI();
            } else {
                updateStatus("HÃY BƯỚC ĐI THẬT SỰ!", true);
            }
        }
        state.lastG = g;
    }

    function handleGPS(pos) {
        if (!state.isLive) return;
        const { latitude, longitude, accuracy, speed } = pos.coords;
        
        // Hiển thị debug vận tốc để khách biết app đang theo dõi
        let currentSpeed = speed ? (speed * 3.6).toFixed(1) : 0;
        document.getElementById('debug').innerText = `Độ chính xác: ±${Math.round(accuracy)}m | Vận tốc: ${currentSpeed} km/h`;

        if (accuracy > 35) return;

        if (state.lastLat !== null) {
            let d = calculateDistance(state.lastLat, state.lastLon, latitude, longitude);
            
            // Nếu di chuyển > 0.7m, tăng điểm tin cậy
            if (d > 0.7 && d < 20) {
                state.gpsDistance += d;
                state.gpsConfidence = 1.0; // Reset điểm tin cậy khi có di chuyển thật
                updateUI();
            } else {
                // Giảm dần điểm tin cậy nếu đứng yên
                state.gpsConfidence *= 0.9;
            }
        }
        state.lastLat = latitude;
        state.lastLon = longitude;
    }

    function updateUI() {
        // Mét hiển thị = GPS tích lũy + (Bước chân * hệ số tin cậy)
        // Nếu đứng yên, gpsConfidence về 0 -> Bước chân không tăng thêm mét
        let displayMeters = Math.floor(state.gpsDistance);
        
        document.getElementById('steps').innerText = state.steps;
        document.getElementById('meters').innerText = displayMeters;
        document.getElementById('progress-fill').style.width = (displayMeters / state.target * 100) + "%";
        
        if (displayMeters > 0) updateStatus("ĐANG GHI NHẬN HÀNH TRÌNH ✅", false);

        if (displayMeters >= state.target) {
            finish();
        }
    }

    function updateStatus(txt, isWarn) {
        let m = document.getElementById('msg');
        m.innerText = txt;
        m.className = isWarn ? "warning" : "";
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function finish() {
        state.isLive = false;
        document.getElementById('track-screen').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        let c = "VTAU-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('code').innerText = c;
        document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=VERIFIED_${c}`;
        Swal.fire("THÀNH CÔNG!", "Bạn đã hoàn thành quãng đường thực tế.", "success");
    }
</script>
</body>
</html>
